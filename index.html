<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wesbell Dispatch</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0d12;
  --s0:#0e1218;
  --s1:#121820;
  --s2:#161d27;
  --b0:#1a2232;
  --b1:#213040;
  --b2:#2a3d55;
  --t0:#e2e8f2;
  --t1:#8a9bb5;
  --t2:#4a5a72;
  --amber:#f0a030;
  --green:#20d090;
  --cyan:#20c0d0;
  --red:#e84848;
  --violet:#9878f0;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:8px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--t0);
  font-family:var(--sans);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--s0);
  border-bottom:1px solid var(--b0);
}
.topbar-inner{
  max-width:1600px;
  margin:auto;
  padding:0 20px;
  height:50px;
  display:flex;
  align-items:center;
}
.brand{
  font-family:var(--mono);
  font-size:13px;
  letter-spacing:.08em;
  font-weight:600;
  color:var(--amber);
  margin-right:25px;
}
.nav{
  display:flex;
  gap:18px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.nav a{
  color:var(--t2);
  text-decoration:none;
  padding:4px 0;
}
.nav a.active{
  color:var(--amber);
  border-bottom:2px solid var(--amber);
}
.top-right{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}
.badge{
  font-family:var(--mono);
  font-size:10px;
  padding:3px 8px;
  border-radius:999px;
  background:var(--s1);
  border:1px solid var(--b0);
  color:var(--t2);
}
.live-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  margin-right:5px;
}
.btn{
  padding:6px 10px;
  border-radius:6px;
  border:1px solid var(--b1);
  background:var(--s2);
  color:var(--t1);
  font-size:11px;
  cursor:pointer;
}
.btn:hover{border-color:var(--b2);color:var(--t0)}
.btn-danger{border-color:rgba(232,72,72,.3);color:var(--red)}
.btn-danger:hover{background:rgba(232,72,72,.1)}

/* ===== LAYOUT ===== */
.page{
  max-width:1600px;
  margin:auto;
  padding:18px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:18px;
}
@media(max-width:1100px){
  .grid{grid-template-columns:1fr}
}

/* ===== PANELS ===== */
.panel{
  background:var(--s1);
  border:1px solid var(--b0);
  border-radius:var(--r);
  overflow:hidden;
}
.panel-hd{
  padding:10px 14px;
  border-bottom:1px solid var(--b0);
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--t2);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.panel-body{padding:14px}

/* ===== TABLE ===== */
.tbl-head,
.tbl-row{
  display:grid;
  grid-template-columns:100px 80px 150px 70px 90px 1fr 100px 200px;
  align-items:center;
}
.tbl-head{
  background:var(--s0);
  border-bottom:1px solid var(--b0);
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--t2);
}
.tbl-head span,
.tbl-row span,
.tbl-row div{
  padding:8px 10px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.tbl-row{
  border-bottom:1px solid var(--b0);
  transition:background .15s;
}
.tbl-row:hover{background:rgba(255,255,255,.02)}

/* ===== STATUS TAGS ===== */
.stag{
  font-family:var(--mono);
  font-size:10px;
  padding:2px 7px;
  border-radius:4px;
  border:1px solid var(--b0);
}
.stag-Incoming{color:#9ca3af}
.stag-Dropped{color:var(--violet)}
.stag-Loading{color:var(--amber)}
.stag-DockReady{color:var(--cyan)}
.stag-Ready{color:var(--green)}
.stag-Departed{color:var(--t2)}

/* ===== DROPDOWN ===== */
.status-select{
  background:var(--s0);
  border:1px solid var(--b1);
  color:var(--t0);
  padding:5px 7px;
  font-size:11px;
  border-radius:6px;
}

/* ===== SIDE PANEL ===== */
.side{
  position:sticky;
  top:70px;
}
.infobox{
  background:rgba(240,160,48,.08);
  border-left:3px solid var(--amber);
  padding:10px;
  font-size:12px;
  margin-bottom:15px;
  border-radius:6px;
}

/* ===== DRIVER PAGE ===== */
.driver-wrap{
  max-width:420px;
  margin:40px auto;
}
.driver-card{
  background:var(--s1);
  border:1px solid var(--b0);
  border-radius:var(--r);
  padding:20px;
  margin-bottom:18px;
}
.driver-card h3{
  font-size:14px;
  margin-bottom:12px;
}
input,select,textarea{
  width:100%;
  background:var(--s0);
  border:1px solid var(--b1);
  border-radius:6px;
  padding:10px;
  color:var(--t0);
  margin-bottom:10px;
}
button.primary{
  background:rgba(240,160,48,.1);
  border:1px solid rgba(240,160,48,.3);
  color:var(--amber);
  padding:10px;
  font-weight:600;
  cursor:pointer;
  border-radius:6px;
  width:100%;
}
button.primary:hover{background:rgba(240,160,48,.2)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">WESBELL DISPATCH</div>

    <div class="nav">
      <a href="/" id="navDispatch">Dispatcher</a>
      <a href="/dock" id="navDock">Dock</a>
      <a href="/driver" id="navDriver">Driver</a>
      <a href="/supervisor" id="navSupervisor">Supervisor</a>
    </div>

    <div class="top-right">
      <div class="badge"><span class="live-dot"></span>Live</div>
      <div class="badge" id="roleBadge"></div>
      <div class="badge">v<span id="verText">—</span></div>
      <button class="btn" id="btnAudit" style="display:none;">Audit</button>
      <button class="btn btn-danger" id="btnLogout" style="display:none;">Sign Out</button>
    </div>
  </div>
</div>

<!-- ============================= -->
<!-- DRIVER VIEW -->
<!-- ============================= -->
<div id="driverView" style="display:none;">
  <div class="driver-wrap">

    <div class="driver-card">
      <h3>Trailer Drop</h3>
      <input id="v_trailer" placeholder="Trailer number"/>
      <input id="v_door" placeholder="Door (18–42)"/>
      <select id="v_dropType">
        <option>Empty</option>
        <option>Loaded</option>
      </select>
      <button class="primary" id="btnDriverDrop">Submit Drop</button>
    </div>

    <div class="driver-card">
      <h3>Safety Confirmation</h3>
      <input id="c_trailer" placeholder="Trailer (optional)"/>
      <input id="c_door" placeholder="Door (optional)"/>
      <label><input type="checkbox" id="c_loadSecured"/> Load secured</label><br/>
      <label><input type="checkbox" id="c_dockPlateUp"/> Dock plate raised</label>
      <button class="primary" id="btnConfirmSafety">Confirm Safety</button>
    </div>

  </div>
</div>

<!-- ============================= -->
<!-- SUPERVISOR VIEW -->
<!-- ============================= -->
<div id="supervisorView" style="display:none;">
  <div class="page">
    <div class="panel">
      <div class="panel-hd">Supervisor Dashboard</div>
      <div class="panel-body">
        <div id="supKpis"></div>
      </div>
    </div>

    <div class="panel" style="margin-top:18px;">
      <div class="panel-hd">Recent Activity</div>
      <div class="panel-body" id="supFeed"></div>
    </div>

    <div class="panel" style="margin-top:18px;">
      <div class="panel-hd">PIN Management</div>
      <div class="panel-body">
        <input type="password" id="pin_dispatcher" placeholder="New Dispatcher PIN"/>
        <button class="primary" id="btnSetDispatcherPin">Update</button>
        <br/><br/>
        <input type="password" id="pin_dock" placeholder="New Dock PIN"/>
        <button class="primary" id="btnSetDockPin">Update</button>
        <br/><br/>
        <input type="password" id="pin_supervisor" placeholder="New Supervisor PIN"/>
        <button class="primary" id="btnSetSupervisorPin">Update</button>
      </div>
    </div>
  </div>
</div>

<!-- ============================= -->
<!-- DISPATCH / DOCK VIEW -->
<!-- ============================= -->
<div id="dispatchView" style="display:none;">
  <div class="page">
    <div class="grid">

      <!-- MAIN BOARD -->
      <div>

        <div class="panel">
          <div class="panel-hd">
            Trailer Board
            <span id="countsPill"></span>
          </div>

          <div class="tbl-head">
            <span>Trailer</span>
            <span>Dir</span>
            <span>Status</span>
            <span>Door</span>
            <span>Type</span>
            <span>Note</span>
            <span>Updated</span>
            <span>Actions</span>
          </div>

          <div id="tbody"></div>

        </div>

        <div class="panel" style="margin-top:18px;">
          <div class="panel-hd">Safety Confirmations</div>
          <div class="panel-body">
            <div id="confBody"></div>
          </div>
        </div>

      </div>

      <!-- SIDE PANEL -->
      <div class="panel side">
        <div class="panel-hd" id="panelTitle">Controls</div>
        <div class="panel-body" id="panelBody"></div>
      </div>

    </div>
  </div>
</div>

<script>
(() => {
  const CSRF = { "Content-Type": "application/json", "X-Requested-With": "XMLHttpRequest" };

  // state
  let ROLE = null, VERSION = "";
  let trailers = {};
  let dockPlates = {};
  let confirmations = [];
  let auditRows = [];

  // dom helpers
  const el = (id) => document.getElementById(id);
  const pathName = () => (location.pathname || "/").toLowerCase();
  const isDriver = () => pathName().startsWith("/driver");
  const isDockRoute = () => pathName().startsWith("/dock");
  const isSupervisorRoute = () => pathName().startsWith("/supervisor");
  const isDispatchRoute = () => !isDriver() && !isDockRoute() && !isSupervisorRoute();

  // utils
  const esc = (s) => String(s ?? "")
    .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;").replaceAll("'", "&#039;");

  const fmtTime = (ms) => {
    if (!ms) return "";
    try {
      return new Date(ms).toLocaleString(undefined, {
        month: "short",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    } catch { return String(ms); }
  };

  const timeAgo = (ms) => {
    if (!ms) return "";
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s / 60)}m ago`;
    if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
    return `${Math.floor(s / 86400)}d ago`;
  };

  async function apiJson(url, opts) {
    const res = await fetch(url, opts);
    if (res.status === 401) { location.href = "/login?expired=1"; return; }
    if (!res.ok) {
      const t = await res.text().catch(() => "");
      throw new Error(t || ("HTTP " + res.status));
    }
    const ct = res.headers.get("content-type") || "";
    return ct.includes("application/json") ? res.json() : {};
  }

  // tiny toast (fallback if your toast exists in your main index)
  function toast(title, body, type) {
    // if you have the real toast elements from your full index, use them
    const T = el("toast"), TT = el("toastTitle"), TB = el("toastBody"), BAR = el("toastBar");
    if (T && TT && TB && BAR) {
      TT.textContent = title;
      TB.textContent = body || "";
      BAR.className = "toast-bar " + (type === "ok" ? "ok" : type === "warn" ? "warn" : "err");
      T.style.display = "block";
      clearTimeout(toast._t);
      toast._t = setTimeout(() => T.style.display = "none", 4500);
      return;
    }
    // fallback
    console.log(`[${type || "info"}] ${title}: ${body || ""}`);
  }

  // ========= NAV / VIEW SWITCH =========
  function highlightNav() {
    const map = [
      ["navDispatch", isDispatchRoute()],
      ["navDock", isDockRoute()],
      ["navDriver", isDriver()],
      ["navSupervisor", isSupervisorRoute()],
    ];
    map.forEach(([id, on]) => {
      const a = el(id);
      if (!a) return;
      a.classList.toggle("active", !!on);
    });

    const rb = el("roleBadge");
    if (rb) {
      if (ROLE) { rb.style.display = ""; rb.textContent = ROLE.toUpperCase(); }
      else { rb.style.display = "none"; rb.textContent = ""; }
    }
    const vt = el("verText");
    if (vt) vt.textContent = VERSION || "—";
  }

  // ========= ROLE CONTROL PANEL =========
  function renderRolePanel() {
    const panelTitle = el("panelTitle");
    const panelBody  = el("panelBody");

    if (!panelTitle || !panelBody) return;

    // DOCK: remove dispatcher controls completely (your request)
    if (ROLE === "dock") {
      panelTitle.textContent = "Dock";
      panelBody.innerHTML = `
        <div style="font-size:12px;line-height:1.55;color:#8a9bb5;">
          <b style="color:#e2e8f2;">Dock Workflow</b><br/>
          • When trailer arrives: set <b style="color:#20c0d0;">Loading</b><br/>
          • When done: set <b style="color:#20c0d0;">Dock Ready</b><br/>
          Dispatcher will handle Ready/Departed and full edits.
        </div>
      `;
      const btnAudit = el("btnAudit");
      if (btnAudit) btnAudit.style.display = "none";
      const btnLogout = el("btnLogout");
      if (btnLogout) btnLogout.style.display = "";
      return;
    }

    // DISPATCHER
    if (ROLE === "dispatcher") {
      panelTitle.textContent = "Dispatcher";
      panelBody.innerHTML = `
        <div style="font-size:12px;line-height:1.55;color:#8a9bb5;margin-bottom:10px;">
          <b style="color:#e2e8f2;">Dispatcher Controls</b><br/>
          Add trailers, edit any trailer, and manage Ready/Departed.
        </div>

        <label style="display:block;font-size:11px;color:#4a5a72;margin:6px 0 4px;">Trailer Number</label>
        <input id="d_trailer" placeholder="e.g. 5312" style="width:100%;padding:10px;border-radius:10px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;font-size:14px;font-family:monospace;"/>

        <div style="display:flex;gap:8px;margin-top:10px;">
          <div style="flex:1;">
            <label style="display:block;font-size:11px;color:#4a5a72;margin:6px 0 4px;">Direction</label>
            <select id="d_direction" style="width:100%;padding:10px;border-radius:10px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;font-size:14px;">
              <option>Inbound</option><option>Outbound</option><option>Cross Dock</option>
            </select>
          </div>
          <div style="flex:1;">
            <label style="display:block;font-size:11px;color:#4a5a72;margin:6px 0 4px;">Drop Type</label>
            <select id="d_dropType" style="width:100%;padding:10px;border-radius:10px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;font-size:14px;">
              <option value="">—</option><option>Empty</option><option>Loaded</option>
            </select>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:10px;">
          <div style="flex:1;">
            <label style="display:block;font-size:11px;color:#4a5a72;margin:6px 0 4px;">Door (18–42)</label>
            <input id="d_door" placeholder="21" style="width:100%;padding:10px;border-radius:10px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;font-size:14px;font-family:monospace;"/>
          </div>
          <div style="flex:1;">
            <label style="display:block;font-size:11px;color:#4a5a72;margin:6px 0 4px;">Status</label>
            <select id="d_status" style="width:100%;padding:10px;border-radius:10px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;font-size:14px;">
              <option>Incoming</option><option>Dropped</option><option>Loading</option><option>Dock Ready</option><option>Ready</option><option>Departed</option>
            </select>
          </div>
        </div>

        <label style="display:block;font-size:11px;color:#4a5a72;margin:10px 0 4px;">Note</label>
        <textarea id="d_note" placeholder="Optional note…" style="width:100%;min-height:70px;padding:10px;border-radius:10px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;font-size:14px;"></textarea>

        <button class="primary" id="btnSaveTrailer" style="width:100%;margin-top:10px;">Save Trailer</button>
        <button class="btn btn-danger" id="btnClearAll" style="width:100%;margin-top:10px;">Clear All Trailers</button>
      `;
      const btnAudit = el("btnAudit");
      if (btnAudit) btnAudit.style.display = "";
      const btnLogout = el("btnLogout");
      if (btnLogout) btnLogout.style.display = "";
      return;
    }

    // SUPERVISOR (no controls here; supervisor page has its own)
    if (ROLE === "supervisor") {
      panelTitle.textContent = "Supervisor";
      panelBody.innerHTML = `<div style="color:#8a9bb5;font-size:12px;line-height:1.55;">Use Supervisor page for KPIs, audit feed, and PIN resets.</div>`;
      const btnAudit = el("btnAudit");
      if (btnAudit) btnAudit.style.display = "none";
      const btnLogout = el("btnLogout");
      if (btnLogout) btnLogout.style.display = "";
      return;
    }

    // Not authenticated
    panelTitle.textContent = "Not Signed In";
    panelBody.innerHTML = `<div style="color:#8a9bb5;font-size:12px;line-height:1.55;">Please <a href="/login" style="color:#20c0d0;">sign in</a> to access controls.</div>`;
    const btnAudit = el("btnAudit");
    if (btnAudit) btnAudit.style.display = "none";
    const btnLogout = el("btnLogout");
    if (btnLogout) btnLogout.style.display = "none";
  }

  // ========= BOARD RENDER =========
  const STATUS_ORDER = ["Incoming", "Dropped", "Loading", "Dock Ready", "Ready", "Departed"];

  // your big index has tags/colors; this minimal version just shows plain text.
  function statusTag(s) {
    return `<span class="stag">${esc(s || "—")}</span>`;
  }

  // IMPORTANT CHANGE:
  // - Dispatcher gets inline STATUS dropdown per row (your request)
  // - Dock gets ONLY two buttons: Loading, Dock Ready (no dispatch controls)
  // - Dock route still shows board, but no add/edit panel
  function renderBoard() {
    const tb = el("tbody");
    if (!tb) return;

    const rows = Object.entries(trailers)
      .map(([trailer, r]) => ({ trailer, ...r }))
      .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

    const countsPill = el("countsPill");
    if (countsPill) countsPill.textContent = rows.length;

    if (!rows.length) {
      tb.innerHTML = `<div style="padding:18px;color:#4a5a72;">No trailers.</div>`;
      return;
    }

    const isDockUser = (ROLE === "dock");
    const isDispatcher = (ROLE === "dispatcher");
    const isSupervisor = (ROLE === "supervisor");

    tb.innerHTML = rows.map(r => {
      const trailer = esc(r.trailer);
      const dir = esc(r.direction || "—");
      const door = r.door ? esc(r.door) : "—";
      const dropType = r.dropType ? esc(r.dropType) : "—";
      const note = r.note ? esc(r.note) : "—";
      const updated = r.updatedAt ? esc(timeAgo(r.updatedAt)) : "—";

      // ACTIONS
      let actionsHtml = `<span style="color:#4a5a72;">—</span>`;

      // Dock controls: ONLY allowed status changes
      if (isDockUser) {
        if (r.status === "Dropped" || r.status === "Incoming") {
          actionsHtml = `<button class="btn" data-act="dockSet" data-to="Loading" data-trailer="${trailer}">Loading</button>`;
        } else if (r.status === "Loading") {
          actionsHtml = `<button class="btn" data-act="dockSet" data-to="Dock Ready" data-trailer="${trailer}">Dock Ready</button>`;
        } else {
          actionsHtml = `<span style="color:#4a5a72;">${esc(r.status || "—")}</span>`;
        }
      }

      // Dispatcher: inline status dropdown + save + delete
      if (isDispatcher) {
        const cur = r.status || "";
        const opts = STATUS_ORDER.map(s => `<option ${s === cur ? "selected" : ""}>${esc(s)}</option>`).join("");
        actionsHtml = `
          <div style="display:flex;gap:6px;align-items:center;">
            <select data-act="statusSelect" data-trailer="${trailer}" style="padding:6px 8px;border-radius:8px;border:1px solid #213040;background:#0e1218;color:#e2e8f2;">
              ${opts}
            </select>
            <button class="btn" data-act="saveRowStatus" data-trailer="${trailer}">Save</button>
            <button class="btn btn-danger" data-act="delete" data-trailer="${trailer}">Del</button>
          </div>
        `;
      }

      // Supervisor view (read-only)
      if (isSupervisor && (isSupervisorRoute() || ROLE === "supervisor")) {
        actionsHtml = `<span style="color:#4a5a72;">view</span>`;
      }

      return `
        <div class="tbl-row">
          <span class="mono">${trailer}</span>
          <span>${dir}</span>
          <span>${statusTag(r.status)}</span>
          <span class="mono">${door}</span>
          <span class="mono">${dropType}</span>
          <span title="${note}">${note}</span>
          <span class="muted" title="${esc(fmtTime(r.updatedAt))}">${updated}</span>
          <span>${actionsHtml}</span>
        </div>
      `;
    }).join("");
  }

  // ========= CONFIRMATIONS =========
  function renderConfirmations() {
    const cb = el("confBody");
    if (!cb) return;
    if (!confirmations.length) {
      cb.innerHTML = `<div style="color:#4a5a72;padding:10px;">No confirmations yet.</div>`;
      return;
    }
    cb.innerHTML = confirmations.slice(0, 25).map(c => {
      return `<div style="padding:6px 0;border-bottom:1px solid #1a2232;color:#8a9bb5;">
        <span style="color:#4a5a72;">${esc(fmtTime(c.at))}</span>
        · <span style="color:#e2e8f2;font-family:monospace;">${esc(c.trailer || "—")}</span>
        · Door <span style="font-family:monospace;">${esc(c.door || "—")}</span>
      </div>`;
    }).join("");
  }

  // ========= SUPERVISOR KPI + FEED =========
  function renderKpis() {
    const k = el("supKpis");
    if (!k) return;
    const v = Object.values(trailers);
    const total = v.length;
    const loading = v.filter(x => x.status === "Loading").length;
    const ready = v.filter(x => x.status === "Ready" || x.status === "Dock Ready").length;
    const departed = v.filter(x => x.status === "Departed").length;
    const conf = confirmations.length;

    k.innerHTML = `
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-lbl">Total</div></div>
        <div class="kpi"><div class="kpi-val">${loading}</div><div class="kpi-lbl">Loading</div></div>
        <div class="kpi"><div class="kpi-val">${ready}</div><div class="kpi-lbl">Ready/Dock Ready</div></div>
        <div class="kpi"><div class="kpi-val">${departed}</div><div class="kpi-lbl">Departed</div></div>
        <div class="kpi"><div class="kpi-val">${conf}</div><div class="kpi-lbl">Safety Confirms</div></div>
      </div>
    `;
  }

  function renderSupervisorFeed(rows) {
    const feed = el("supFeed");
    if (!feed) return;
    if (!rows || !rows.length) {
      feed.innerHTML = `<div style="color:#4a5a72;">No activity.</div>`;
      return;
    }
    feed.innerHTML = rows.slice(0, 20).map(r => {
      return `<div style="padding:8px 0;border-bottom:1px solid #1a2232;color:#8a9bb5;">
        <div><b style="color:#e2e8f2;">${esc(r.actorRole || "—")}</b> · ${esc(r.action || "—")} · <span style="font-family:monospace;color:#e2e8f2;">${esc(r.entityId || "—")}</span></div>
        <div style="color:#4a5a72;font-family:monospace;font-size:11px;">${esc(timeAgo(r.at))}</div>
      </div>`;
    }).join("");
  }

  async function loadAuditFeed() {
    try {
      const rows = await apiJson("/api/audit?limit=200");
      auditRows = rows || [];
      renderSupervisorFeed(auditRows);
    } catch (e) {
      toast("Audit error", e.message, "err");
    }
  }

  // ========= ACTIONS =========
  async function doLogout() {
    try { await apiJson("/api/logout", { method: "POST", headers: CSRF }); } catch {}
    location.href = "/login";
  }

  async function dispSaveFromPanel() {
    const trailer = (el("d_trailer")?.value || "").trim();
    if (!trailer) return toast("Validation", "Trailer number is required.", "err");

    const payload = {
      trailer,
      direction: (el("d_direction")?.value || "").trim(),
      status: (el("d_status")?.value || "").trim(),
      door: (el("d_door")?.value || "").trim(),
      dropType: (el("d_dropType")?.value || "").trim(),
      note: (el("d_note")?.value || "").trim(),
    };

    try {
      await apiJson("/api/upsert", { method: "POST", headers: CSRF, body: JSON.stringify(payload) });
      toast("Saved", `Trailer ${trailer} updated.`, "ok");
    } catch (e) {
      toast("Save failed", e.message, "err");
    }
  }

  async function dispClearAll() {
    if (!confirm("Clear ALL trailer records? This cannot be undone.")) return;
    try {
      await apiJson("/api/clear", { method: "POST", headers: CSRF });
      toast("Cleared", "All trailers removed.", "warn");
    } catch (e) {
      toast("Clear failed", e.message, "err");
    }
  }

  async function deleteTrailer(trailer) {
    if (!confirm(`Delete trailer ${trailer}?`)) return;
    try {
      await apiJson("/api/delete", { method: "POST", headers: CSRF, body: JSON.stringify({ trailer }) });
      toast("Deleted", `Trailer ${trailer} removed.`, "warn");
    } catch (e) {
      toast("Delete failed", e.message, "err");
    }
  }

  async function dockSet(trailer, status) {
    // server already enforces dock can only set Loading/Dock Ready
    try {
      await apiJson("/api/upsert", { method: "POST", headers: CSRF, body: JSON.stringify({ trailer, status }) });
      toast("Updated", `${trailer} → ${status}`, "ok");
    } catch (e) {
      toast("Update failed", e.message, "err");
    }
  }

  async function saveRowStatus(trailer) {
    const sel = document.querySelector(`select[data-act="statusSelect"][data-trailer="${CSS.escape(trailer)}"]`);
    const status = (sel?.value || "").trim();
    if (!status) return toast("Validation", "Pick a status.", "err");
    try {
      await apiJson("/api/upsert", { method: "POST", headers: CSRF, body: JSON.stringify({ trailer, status }) });
      toast("Saved", `${trailer} → ${status}`, "ok");
    } catch (e) {
      toast("Save failed", e.message, "err");
    }
  }

  async function driverDrop() {
    const trailer = (el("v_trailer")?.value || "").trim();
    const door = (el("v_door")?.value || "").trim();
    const dropType = (el("v_dropType")?.value || "Empty").trim();
    if (!trailer) return toast("Required", "Enter a trailer number.", "err");
    if (!door) return toast("Required", "Enter a door number.", "err");

    try {
      await apiJson("/api/driver/drop", { method: "POST", headers: CSRF, body: JSON.stringify({ trailer, door, dropType }) });
      toast("Submitted", `Drop recorded: ${trailer} @ door ${door}`, "ok");
      el("v_trailer").value = "";
      el("v_door").value = "";
      el("v_dropType").value = "Empty";
    } catch (e) {
      toast("Submission failed", e.message, "err");
    }
  }

  async function confirmSafety() {
    const loadSecured = !!el("c_loadSecured")?.checked;
    const dockPlateUp = !!el("c_dockPlateUp")?.checked;
    if (!loadSecured || !dockPlateUp) return toast("Incomplete", "Both safety boxes must be checked.", "err");

    const trailer = (el("c_trailer")?.value || "").trim();
    const door = (el("c_door")?.value || "").trim();

    try {
      await apiJson("/api/confirm-safety", {
        method: "POST",
        headers: CSRF,
        body: JSON.stringify({ trailer, door, loadSecured: true, dockPlateUp: true })
      });
      toast("Confirmed", "Safety confirmation logged.", "ok");
      el("c_trailer").value = "";
      el("c_door").value = "";
      el("c_loadSecured").checked = false;
      el("c_dockPlateUp").checked = false;
    } catch (e) {
      toast("Submission failed", e.message, "err");
    }
  }

  // ========= CLICK HANDLER =========
  document.addEventListener("click", (ev) => {
    const t = ev.target;

    if (t?.id === "btnLogout") return doLogout();
    if (t?.id === "btnSaveTrailer") return dispSaveFromPanel();
    if (t?.id === "btnClearAll") return dispClearAll();
    if (t?.id === "btnDriverDrop") return driverDrop();
    if (t?.id === "btnConfirmSafety") return confirmSafety();

    const act = t?.dataset?.act;
    if (!act) return;

    if (act === "dockSet") {
      const trailer = t.dataset.trailer;
      const to = t.dataset.to;
      if (trailer && to) return dockSet(trailer, to);
    }

    if (act === "saveRowStatus") {
      const trailer = t.dataset.trailer;
      if (trailer) return saveRowStatus(trailer);
    }

    if (act === "delete") {
      const trailer = t.dataset.trailer;
      if (trailer) return deleteTrailer(trailer);
    }
  });

  // ========= INIT VIEW =========
  async function loadInitial() {
    try {
      const w = await apiJson("/api/whoami");
      ROLE = w?.role || null;
      VERSION = w?.version || "";
    } catch { ROLE = null; VERSION = ""; }

    // view show/hide
    const dv = el("dispatchView"), drv = el("driverView"), sv = el("supervisorView");
    if (dv) dv.style.display = "none";
    if (drv) drv.style.display = "none";
    if (sv) sv.style.display = "none";

    if (isDriver()) {
      if (drv) drv.style.display = "";
      if (el("btnAudit")) el("btnAudit").style.display = "none";
      if (el("btnLogout")) el("btnLogout").style.display = "none"; // driver is open
    } else if (isSupervisorRoute() || ROLE === "supervisor") {
      if (sv) sv.style.display = "";
      if (el("btnAudit")) el("btnAudit").style.display = "none";
      if (el("btnLogout")) el("btnLogout").style.display = "";
    } else {
      if (dv) dv.style.display = "";
      // Dock route should still show the board, but no dispatcher panel (role panel handles this)
      if (el("btnLogout")) el("btnLogout").style.display = ROLE ? "" : "none";
      if (el("btnAudit")) el("btnAudit").style.display = (ROLE === "dispatcher") ? "" : "none";
    }

    highlightNav();

    // load initial data
    try { trailers = await apiJson("/api/state"); } catch { trailers = {}; }
    try { confirmations = await apiJson("/api/confirmations"); } catch { /* optional endpoint doesn't exist */ }
    // If server doesn't have /api/confirmations, confirmations will come from WS. Keep empty on load.
    if (!Array.isArray(confirmations)) confirmations = [];

    // render
    if (isSupervisorRoute() || ROLE === "supervisor") {
      renderKpis();
      await loadAuditFeed();
    } else if (!isDriver()) {
      renderRolePanel();
      renderBoard();
      renderConfirmations();
    }
  }

  // ========= WEBSOCKET =========
  let wsRetry = 0;

  function connectWs() {
    const dot = document.querySelector(".live-dot");
    const setWs = (ok) => {
      if (!dot) return;
      dot.style.background = ok ? "#20d090" : "#e84848";
      dot.style.boxShadow = ok ? "0 0 8px #20d090" : "0 0 8px #e84848";
    };

    setWs(false);
    const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}`);

    ws.onopen = () => { wsRetry = 0; setWs(true); };
    ws.onclose = () => {
      setWs(false);
      setTimeout(connectWs, Math.min(8000, 500 + wsRetry++ * 650));
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }
      const { type, payload } = msg || {};

      if (type === "version") {
        VERSION = payload?.version || VERSION;
        const vt = el("verText"); if (vt) vt.textContent = VERSION || "—";
      }

      if (type === "state") {
        trailers = payload || {};
        if (!isDriver() && !(isSupervisorRoute() || ROLE === "supervisor")) renderBoard();
        if (isSupervisorRoute() || ROLE === "supervisor") renderKpis();
      }

      if (type === "confirmations") {
        confirmations = Array.isArray(payload) ? payload : [];
        if (!isDriver() && !(isSupervisorRoute() || ROLE === "supervisor")) renderConfirmations();
        if (isSupervisorRoute() || ROLE === "supervisor") renderKpis();
      }

      if (type === "notify" && payload?.kind === "ready") {
        toast("Trailer Ready", `${payload.trailer} is READY${payload.door ? " at door " + payload.door : ""}.`, "ok");
      }

      // Optional: supervisor feed can be refreshed periodically from /api/audit
      // (WS doesn't push audit rows in your server right now)
    };
  }

  // ========= BOOT =========
  loadInitial().then(connectWs);
})();
</script>
