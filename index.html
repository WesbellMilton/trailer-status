<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wesbell Trailer Status</title>

<style>
:root{
  --bg0:#050814;
  --bg2:#0b1430;
  --line:rgba(120,145,220,.18);
  --text:#eaf0ff;
  --muted:#a7b2d3;
  --good:#22c55e;
  --warn:#f59e0b;
  --bad:#ef4444;
  --cool:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  background:
    radial-gradient(1000px 500px at 20% -10%, rgba(99,102,241,.35), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg2));
}
.wrap{max-width:1200px;margin:auto;padding:20px}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px;border:1px solid var(--line);
  border-radius:14px;background:rgba(255,255,255,.04)
}
.brand h1{margin:0;font-size:18px}
.sub{font-size:12px;color:var(--muted)}
.kpis span{margin-left:12px;font-size:13px;color:var(--muted)}
.kpis strong{color:white}

.card{
  margin-top:14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.04);
  overflow:hidden;
}

.controls{padding:14px;display:flex;gap:10px;flex-wrap:wrap}
input,select,button{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#0c132a;
  color:white;
}
button{cursor:pointer;font-weight:600}
button.primary{background:rgba(99,102,241,.25)}
button.danger{background:rgba(239,68,68,.25)}

table{width:100%;border-collapse:collapse}
thead th{
  font-size:12px;color:var(--muted);
  padding:12px;text-align:left;
  border-bottom:1px solid var(--line)
}
tbody td{
  padding:12px;
  border-bottom:1px solid rgba(120,145,220,.12)
}
tbody tr:hover{background:rgba(255,255,255,.03)}

.tag{
  padding:4px 8px;border-radius:999px;
  font-size:12px;font-weight:700
}
.good{background:rgba(34,197,94,.18)}
.warn{background:rgba(245,158,11,.18)}
.bad{background:rgba(239,68,68,.18)}
.cool{background:rgba(148,163,184,.18)}

.flash{
  animation:flash 1s infinite;
  background:rgba(34,197,94,.35)!important
}
@keyframes flash{
  0%{box-shadow:0 0 0 rgba(34,197,94,0)}
  50%{box-shadow:0 0 12px rgba(34,197,94,.7)}
  100%{box-shadow:0 0 0 rgba(34,197,94,0)}
}

/* Quick Tips */
.tips{
  padding:14px;
  border-top:1px solid var(--line);
  display:flex;gap:20px;flex-wrap:wrap
}
.tipBox{flex:1;min-width:260px}
.tipBox h4{margin:0 0 6px 0;font-size:12px;color:var(--muted);text-transform:uppercase}
.tipBox ul{margin:0;padding-left:18px;font-size:13px;color:var(--muted)}
</style>
</head>

<body>
<div class="wrap">

<div class="topbar">
  <div class="brand">
    <h1>Wesbell Logistics</h1>
    <div class="sub" id="modeLabel">Dispatcher Mode</div>
  </div>
  <div class="kpis">
    <span>Total <strong id="kTotal">0</strong></span>
    <span>Ready <strong id="kReady">0</strong></span>
    <span>Loading <strong id="kLoading">0</strong></span>
    <span>Incoming <strong id="kIncoming">0</strong></span>
    <span>Departed <strong id="kDeparted">0</strong></span>
  </div>
</div>

<div class="card">

<div class="controls" id="controls">
  <input id="trailer" placeholder="Trailer #" />
  <input id="door" placeholder="Dock Door" />
  <select id="direction">
    <option>Inbound</option>
    <option>Outbound</option>
    <option>Cross Dock</option>
  </select>
  <select id="status">
    <option>Incoming</option>
    <option>Loading</option>
    <option>Ready</option>
  </select>
  <button class="primary" id="addBtn">Add / Update</button>
  <button class="danger" id="clearBtn">Clear All</button>
</div>

<table>
<thead>
<tr>
<th>Trailer</th>
<th>Door</th>
<th>Direction</th>
<th>Status</th>
<th id="actionHeader">Actions</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="tips">
  <div class="tipBox">
    <h4>Quick Tips</h4>
    <ul id="tipsLeft"></ul>
  </div>
  <div class="tipBox">
    <h4>Workflow</h4>
    <ul id="tipsRight"></ul>
  </div>
</div>

</div>
</div>

<script>
const isDriver = location.pathname.includes("/driver");
if(isDriver){
  document.getElementById("controls").style.display="none";
  document.getElementById("modeLabel").textContent="Driver Mode";
}

let state={};
let ackMap=JSON.parse(localStorage.getItem("driver_ack")||"{}");

function statusClass(s){
  if(s==="Ready") return "good";
  if(s==="Loading") return "warn";
  if(s==="Incoming") return "bad";
  return "cool";
}

function render(){
  const tb=document.getElementById("tbody");
  tb.innerHTML="";
  Object.entries(state).forEach(([t,v])=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${t}</td>
      <td>${v.door||"-"}</td>
      <td>${v.direction}</td>
      <td><span class="tag ${statusClass(v.status)}">${v.status}</span></td>
    `;
    const td=document.createElement("td");

    if(!isDriver){
      const sel=document.createElement("select");
      ["Incoming","Loading","Ready"].forEach(s=>{
        const o=document.createElement("option");
        o.value=s;o.textContent=s;sel.appendChild(o);
      });
      sel.value=v.status==="Departed"?"Ready":v.status;
      sel.onchange=()=>update(t,v.door,v.direction,sel.value);
      td.appendChild(sel);
    } else {
      if(v.status==="Ready"){
        const btn=document.createElement("button");
        const flash=ackMap[t]!==v.updatedAt;
        btn.className=flash?"flash":"";
        btn.textContent="MOVE";
        btn.onclick=()=>confirmMove(t,v);
        td.appendChild(btn);
      } else td.innerHTML="-";
    }

    tr.appendChild(td);
    tb.appendChild(tr);
  });
  updateKPIs();
}

function updateKPIs(){
  const c={Incoming:0,Loading:0,Ready:0,Departed:0};
  Object.values(state).forEach(v=>c[v.status]++);
  kTotal.textContent=Object.keys(state).length;
  kReady.textContent=c.Ready;
  kLoading.textContent=c.Loading;
  kIncoming.textContent=c.Incoming;
  kDeparted.textContent=c.Departed;
}

async function update(trailer,door,direction,status){
  await fetch("/api/upsert",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({trailer,door,direction,status})});
  load();
}

/* TWO-STEP CONFIRM */
async function confirmMove(t,v){
  if(!confirm("STEP 1/2: Confirm Load Secured")) return;
  if(!confirm("STEP 2/2: Confirm Dock Plate Up")) return;

  await fetch("/api/confirm-safety",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({trailer:t,door:v.door,loadSecured:true,dockPlateUp:true})});

  ackMap[t]=v.updatedAt;
  localStorage.setItem("driver_ack",JSON.stringify(ackMap));
  await update(t,v.door,v.direction,"Departed");
}

async function load(){
  const res=await fetch("/api/state");
  state=await res.json();
  render();
}

addBtn.onclick=()=>{
  const t=trailer.value.trim();
  if(!t) return;
  update(t,door.value,direction.value,status.value);
  trailer.value="";door.value="";
};
clearBtn.onclick=()=>fetch("/api/clear",{method:"POST"}).then(load);

function setTips(){
  if(!isDriver){
    tipsLeft.innerHTML=`
      <li>Enter dock door correctly (ex: D12)</li>
      <li>Only mark Ready when fully staged</li>
      <li>Driver link: ${location.origin}/driver</li>
    `;
    tipsRight.innerHTML=`
      <li>Incoming → Loading → Ready → Departed</li>
      <li>Drivers must confirm both safety steps</li>
    `;
  }else{
    tipsLeft.innerHTML=`
      <li>Only Ready trailers can be moved</li>
      <li>Flashing button = NEW READY</li>
      <li>You must confirm BOTH prompts</li>
    `;
    tipsRight.innerHTML=`
      <li>Confirm Load Secured</li>
      <li>Confirm Dock Plate Up</li>
      <li>Trailer becomes Departed</li>
    `;
  }
}
setTips();

load();
setInterval(load,3000);
</script>
</body>
</html>
