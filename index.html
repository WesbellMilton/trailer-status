<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Trailer Status Board</title>
  <style>
    :root{--text:#eaf0ff;--muted:#a9b4d0;--line:#263454;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#070b14,#0b1220);color:var(--text);}
    .wrap{max-width:1100px;margin:auto;padding:18px;}
    .company{text-align:center;font-size:26px;font-weight:800;margin:6px 0;}
    .subtitle{text-align:center;color:var(--muted);margin-bottom:16px;}
    .card{background:rgba(18,27,47,0.9);border:1px solid var(--line);border-radius:14px;padding:14px;}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    input,select,button{border-radius:10px;border:1px solid var(--line);background:#0d1528;color:var(--text);padding:10px;}
    button{cursor:pointer}
    button.primary{background:#1b2a52;}
    button.danger{background:#3a1020;}
    table{width:100%;border-collapse:collapse;margin-top:14px;}
    th,td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;}
    th{text-align:left;font-size:12px;color:var(--muted);}
    .pill{padding:6px 10px;border-radius:999px;display:inline-block;font-weight:700;}
    .good{background:var(--good);color:#06120b;}
    .warn{background:var(--warn);color:#1a1202;}
    .bad{background:var(--bad);color:#1a0202;}
    .small{color:var(--muted);font-size:12px;margin-top:10px;display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;}
    .badge{padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#0d1528;color:var(--muted);}

    /* Driver view */
    .driverWrap{max-width:950px;margin:auto;padding:18px;}
    .readyGrid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap:12px;
      margin-top:14px;
    }
    .readyCard{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background:rgba(18,27,47,0.9);
    }
    .readyType{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .readyTrailer{
      font-size:44px;
      font-weight:900;
      line-height:1.05;
      color:var(--good);
      text-shadow: 0 0 18px rgba(34,197,94,0.20);
    }
    .readyStatus{
      margin-top:10px;
      display:inline-block;
      background:rgba(34,197,94,0.18);
      border:1px solid rgba(34,197,94,0.35);
      color:var(--good);
      padding:6px 10px;
      border-radius:999px;
      font-weight:800;
      font-size:12px;
    }
    .driverHint{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>

<div id="dispatcherView" class="wrap" style="display:none;">
  <div class="company">Wesbell Logistics</div>
  <div class="subtitle">Trailer Status Board</div>

  <div class="card">
    <div class="row" id="controls">
      <select id="type">
        <option value="Inbound">Inbound</option>
        <option value="Outbound">Outbound</option>
      </select>

      <input id="trailer" placeholder="Trailer #" />

      <select id="status"></select>

      <button class="primary" id="addBtn">Add / Update</button>
      <button class="danger" id="clearBtn">Clear All</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Trailer #</th>
          <th>Status</th>
          <th id="actionHeader">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="small">
      <div>Dispatcher view</div>
      <div class="badge" id="conn">Connecting…</div>
    </div>
  </div>
</div>

<div id="driverView" class="driverWrap" style="display:none;">
  <div class="company">Wesbell Logistics</div>
  <div class="subtitle">Driver Ready Board</div>

  <div class="readyGrid" id="readyGrid"></div>

  <div class="driverHint">
    Only shows <b>Inbound: Completed</b> and <b>Outbound: Released</b>. Refreshes automatically.
    <span class="badge" id="driverConn" style="margin-left:10px;">Connecting…</span>
  </div>
</div>

<script>
  // ----- Mode -----
  const params = new URLSearchParams(location.search);
  const mode = (params.get("mode") || "dispatcher").toLowerCase();
  const isDriver = mode === "driver";

  const dispatcherView = document.getElementById("dispatcherView");
  const driverView = document.getElementById("driverView");

  dispatcherView.style.display = isDriver ? "none" : "block";
  driverView.style.display = isDriver ? "block" : "none";

  // ----- Status lists -----
  const STATUS = {
    Inbound: ["Arrived","Door Assigned","Unloading","Staged","Completed"],
    Outbound:["Scheduled","Loading","Sealed","Released"]
  };

  // ----- Shared state -----
  let state = {}; // { trailer: { type, status, updatedAt } }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function isReadyRow(r){
    return (r.type==="Inbound" && r.status==="Completed") || (r.type==="Outbound" && r.status==="Released");
  }

  function pillClass(type, status){
    if (isReadyRow({type, status})) return "good";
    if (status==="Loading" || status==="Unloading" || status==="Sealed" || status==="Door Assigned") return "warn";
    return "bad";
  }

  function priorityRank(type, status){
    if (isReadyRow({type, status})) return 0;
    if (status==="Loading" || status==="Unloading" || status==="Sealed") return 1;
    return 2;
  }

  // ----- Dispatcher UI -----
  const tbody = document.getElementById("tbody");
  const conn = document.getElementById("conn");
  const typeEl = document.getElementById("type");
  const statusEl = document.getElementById("status");

  function fillStatus(){
    statusEl.innerHTML = "";
    for (const s of STATUS[typeEl.value]){
      const o = document.createElement("option");
      o.value = s;
      o.textContent = s;
      statusEl.appendChild(o);
    }
  }
  if (!isDriver){
    fillStatus();
    typeEl.addEventListener("change", fillStatus);
  }

  function renderDispatcher(){
    tbody.innerHTML = "";

    const rows = Object.entries(state).map(([trailer, v]) => ({
      trailer,
      type: v.type || "Inbound",
      status: v.status || "Arrived",
      updatedAt: v.updatedAt || 0
    }));

    rows.sort((a,b)=>{
      const ra = priorityRank(a.type, a.status);
      const rb = priorityRank(b.type, b.status);
      if (ra !== rb) return ra - rb;
      return a.trailer.localeCompare(b.trailer);
    });

    if(!rows.length){
      tbody.innerHTML = <tr><td colspan="4" style="color:var(--muted);">No trailers.</td></tr>;
      return;
    }

    for (const r of rows){
      const tr = document.createElement("tr");
      const cls = pillClass(r.type, r.status);

      tr.innerHTML = `
        <td><strong>${esc(r.type)}</strong></td>
        <td><strong>${esc(r.trailer)}</strong></td>
        <td><span class="pill ${cls}">${esc(r.status)}</span></td>
        <td></td>
      `;

      const td = tr.children[3];

      // Status dropdown based on type
      const sel = document.createElement("select");
      for (const s of STATUS[r.type]){
        const o = document.createElement("option");
        o.value = s; o.textContent = s;
        sel.appendChild(o);
      }
      sel.value = r.status;
      sel.onchange = () => upsert(r.trailer, r.type, sel.value);
      td.appendChild(sel);

      const del = document.createElement("button");
      del.className = "danger";
      del.textContent = "Delete";
      del.style.marginLeft = "8px";
      del.onclick = () => delTrailer(r.trailer);
      td.appendChild(del);

      tbody.appendChild(tr);
    }
  }

  // ----- Driver UI -----
  const readyGrid = document.getElementById("readyGrid");
  const driverConn = document.getElementById("driverConn");

  function renderDriver(){
    readyGrid.innerHTML = "";

    const rows = Object.entries(state).map(([trailer, v]) => ({
      trailer,
      type: v.type || "Inbound",
      status: v.status || "Arrived",
      updatedAt: v.updatedAt || 0
    })).filter(isReadyRow);

    // Show newest ready first
    rows.sort((a,b)=> (b.updatedAt - a.updatedAt) || a.trailer.localeCompare(b.trailer));

    if (!rows.length){
      readyGrid.innerHTML = `
        <div class="readyCard" style="grid-column:1/-1; text-align:center;">
          <div class="readyType">No ready trailers</div>
          <div style="color:var(--muted);">Nothing is released/completed yet.</div>
        </div>
      `;
      return;
    }

    for (const r of rows){
      const div = document.createElement("div");
      div.className = "readyCard";
      div.innerHTML = `
        <div class="readyType">${esc(r.type)}</div>
        <div class="readyTrailer">${esc(r.trailer)}</div>
        <div class="readyStatus">${esc(r.status)}</div>
      `;
      readyGrid.appendChild(div);
    }
  }

  function render(){
    if (isDriver) renderDriver();
    else renderDispatcher();
  }

  // ----- API -----
  async function upsert(trailer, type, status){
    const res = await fetch("/api/upsert", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ trailer, type, status })
    });

    if(!res.ok){
      const t = await res.text();
      alert("Upsert failed: " + t);
      return;
    }

    // immediate UI update
    state[trailer] = { type, status, updatedAt: Date.now() };
    render();
  }

  async function delTrailer(trailer){
    const res = await fetch("/api/delete", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ trailer })
    });

    if(!res.ok){
      const t = await res.text();
      alert("Delete failed: " + t);
      return;
    }

    delete state[trailer];
    render();
  }

  async function clearAll(){
    if(!confirm("Clear ALL trailers for everyone?")) return;

    const res = await fetch("/api/clear", { method:"POST" });

    if(!res.ok){
      const t = await res.text();
      alert("Clear failed: " + t);
      return;
    }

    state = {};
    render();
  }

  if (!isDriver){
    document.getElementById("addBtn").onclick = () => {
      const trailer = document.getElementById("trailer").value.trim();
      const type = document.getElementById("type").value;
      const status = document.getElementById("status").value;
      if(!trailer) return;
      upsert(trailer, type, status);
      document.getElementById("trailer").value = "";
    };
    document.getElementById("clearBtn").onclick = clearAll;
    document.getElementById("trailer").addEventListener("keydown",(e)=>{
      if(e.key==="Enter") document.getElementById("addBtn").click();
    });
  }

  // ----- WebSocket + fallback polling -----
  function setConn(text){
    if (isDriver) driverConn.textContent = text;
    else conn.textContent = text;
  }

  function connectWS(){
    const wsUrl = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => setConn("Live ✅");

    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);

      if (msg.type === "state"){
        state = msg.payload || {};
        render();
      }

      if (msg.type === "upsert"){
        const p = msg.payload || {};
        state[p.trailer] = { type: p.type, status: p.status, updatedAt: p.updatedAt };
        render();
      }

      if (msg.type === "delete"){
        delete state[msg.payload.trailer];
        render();
      }
    };

    ws.onerror = () => setConn("WS error — polling…");
    ws.onclose = () => setConn("Disconnected — polling…");
  }

  async function poll(){
    try{
      const res = await fetch("/api/state");
      if(res.ok){
        state = await res.json();
        render();
      }
    } catch {}
  }

  connectWS();
  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
