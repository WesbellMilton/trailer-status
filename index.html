<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Trailer Status Board</title>
  <style>
    :root{--text:#eaf0ff;--muted:#a9b4d0;--line:#263454;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#070b14,#0b1220);color:var(--text);}
    .wrap{max-width:1000px;margin:auto;padding:20px;}
    .company{text-align:center;font-size:26px;font-weight:800;margin-bottom:6px;}
    .subtitle{text-align:center;color:var(--muted);margin-bottom:20px;}
    .card{background:rgba(18,27,47,0.9);border:1px solid var(--line);border-radius:14px;padding:16px;}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    input,select,button{border-radius:10px;border:1px solid var(--line);background:#0d1528;color:var(--text);padding:10px;}
    button{cursor:pointer}
    button.primary{background:#1b2a52;}
    button.danger{background:#3a1020;}
    table{width:100%;border-collapse:collapse;margin-top:15px;}
    th,td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;}
    th{text-align:left;font-size:12px;color:var(--muted);}
    .pill{padding:6px 10px;border-radius:999px;display:inline-block;font-weight:700;}
    .good{background:var(--good);color:#06120b;}
    .warn{background:var(--warn);color:#1a1202;}
    .bad{background:var(--bad);color:#1a0202;}
    .small{color:var(--muted);font-size:12px;margin-top:10px;}
    .notesCell{max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="company">Wesbell Logistics</div>
  <div class="subtitle">Trailer Status Board</div>

  <div class="card">
    <div class="row" id="controls">
      <input id="trailer" placeholder="Trailer #" />
      <select id="status">
        <option value="Incoming">Incoming</option>
        <option value="Loading">Loading</option>
        <option value="Ready">Ready</option>
      </select>
      <input id="notes" placeholder="Notes (optional)" style="min-width:240px;" />
      <button class="primary" id="addBtn">Add / Update</button>
      <button class="danger" id="clearBtn">Clear All</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Trailer #</th>
          <th>Status</th>
          <th>Notes</th>
          <th id="actionHeader">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="small" id="modeNote">Connecting…</div>
  </div>
</div>

<script>
  const modeNote = document.getElementById("modeNote");
  const actionHeader = document.getElementById("actionHeader");

  let state = {};
  let flashSet = new Set();

  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function statusClass(s){
    return s==="Ready" ? "good" : (s==="Loading" ? "warn" : "bad");
  }

  function render(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const rows = Object.entries(state).map(([trailer, v]) => ({
      trailer,
      status: v.status || "Incoming",
      notes: v.notes || "",
      updatedAt: v.updatedAt || 0
    }));

    const rank = (s)=> s==="Ready"?0:(s==="Loading"?1:2);
    rows.sort((a,b)=> (rank(a.status)-rank(b.status)) || a.trailer.localeCompare(b.trailer));

    if (!rows.length){
      const tr = document.createElement("tr");
      tr.innerHTML = <td colspan="4" style="color:var(--muted);">No trailers.</td>;
      tbody.appendChild(tr);
      return;
    }

    for (const r of rows){
      const tr = document.createElement("tr");

      if (flashSet.has(r.trailer)){
        tr.style.transition = "background 0.2s ease";
        tr.style.background = "rgba(34,197,94,0.35)";
        setTimeout(()=> tr.style.background="", 1200);
      }

      const cls = statusClass(r.status);
      tr.innerHTML = `
        <td><strong>${escapeHtml(r.trailer)}</strong></td>
        <td><span class="pill ${cls}">${escapeHtml(r.status)}</span></td>
        <td class="notesCell" title="${escapeHtml(r.notes)}">${escapeHtml(r.notes)}</td>
      `;

      const td = document.createElement("td");

      // quick edit status
      const sel = document.createElement("select");
      ["Incoming","Loading","Ready"].forEach(s=>{
        const o=document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o);
      });
      sel.value = r.status;
      sel.onchange = () => upsert(r.trailer, sel.value, r.notes);
      td.appendChild(sel);

      // delete
      const del = document.createElement("button");
      del.className="danger";
      del.textContent="Delete";
      del.style.marginLeft="8px";
      del.onclick = () => delTrailer(r.trailer);
      td.appendChild(del);

      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    flashSet.clear();
  }

  async function upsert(trailer, status, notes){
    const res = await fetch("/api/upsert", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ trailer, status, notes })
    });
    if (!res.ok){
      const txt = await res.text();
      alert("Upsert failed: " + txt);
      return;
    }
    // update UI immediately
    state[trailer] = { status, notes, updatedAt: Date.now() };
    render();
  }

  async function delTrailer(trailer){
    const res = await fetch("/api/delete", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ trailer })
    });
    if (!res.ok){
      const txt = await res.text();
      alert("Delete failed: " + txt);
      return;
    }
    delete state[trailer];
    render();
  }

  async function clearAll(){
    if (!confirm("Clear all trailers?")) return;
    const res = await fetch("/api/clear", { method:"POST" });
    if (!res.ok){
      const txt = await res.text();
      alert("Clear failed: " + txt);
      return;
    }
    state = {};
    render();
  }

  // wire buttons
  document.getElementById("addBtn").onclick = () => {
    const trailer = document.getElementById("trailer").value.trim();
    const status = document.getElementById("status").value;
    const notes = document.getElementById("notes").value.trim();
    if (!trailer) return;
    upsert(trailer, status, notes);
    document.getElementById("trailer").value = "";
    document.getElementById("notes").value = "";
  };

  document.getElementById("clearBtn").onclick = clearAll;

  // ---- WebSocket (with fallback) ----
  function connectWS(){
    const wsUrl = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      modeNote.textContent = "Connected ✅";
    };

    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);

      if (msg.type === "state"){
        state = msg.payload || {};
        render();
      }
      if (msg.type === "upsert"){
        const { trailer, status, notes, updatedAt, prevStatus } = msg.payload;
        if (prevStatus && prevStatus !== "Ready" && status === "Ready") flashSet.add(trailer);
        state[trailer] = { status, notes, updatedAt };
        render();
      }
      if (msg.type === "delete"){
        delete state[msg.payload.trailer];
        render();
      }
    };

    ws.onerror = () => {
      modeNote.textContent = "WebSocket error — using fallback polling…";
    };

    ws.onclose = () => {
      modeNote.textContent = "Disconnected — using fallback polling…";
    };
  }

  async function pollState(){
    try {
      const res = await fetch("/api/state");
      if (res.ok){
        state = await res.json();
        render();
      }
    } catch {}
  }

  connectWS();
  pollState();
  setInterval(pollState, 2000); // fallback keeps UI alive even if WS fails
</script>
</body>
</html>
