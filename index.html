<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wesbell Trailer Board</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-inner">

      <div class="brand">
        <span class="mono">WESBELL</span>

        <span class="pill">
          <span class="dot" id="wsDot"></span>
          <span id="wsText">Connecting…</span>
        </span>

        <span class="pill">
          Role: <strong id="roleText">—</strong>
        </span>

        <span class="pill">
          v<span id="verText">—</span>
        </span>
      </div>

      <div class="actions">

        <button id="btnRefresh" class="btn-refresh">
          Refresh
        </button>

        <a href="/" class="btn-dispatcher">
          Dispatcher
        </a>

        <a href="/dock" class="btn-dock">
          Dock
        </a>

        <a href="/driver" class="btn-driver">
          Driver
        </a>

        <button id="btnLogout" class="btn-logout" style="display:none;">
          Logout
        </button>

      </div>

    </div>
  </div>

  <!-- MAIN WRAP -->
  <div class="wrap">

    <div class="grid-2">

      <!-- TRAILER BOARD -->
      <div class="card">
        <h3>
          <span>Trailer Board</span>
          <span class="mini" id="countsPill">0 trailers</span>
        </h3>

        <div class="body">

          <div class="row">
            <input id="search" placeholder="Search trailer / door / note" />

            <select id="filterDir">
              <option value="">All Directions</option>
              <option>Inbound</option>
              <option>Outbound</option>
              <option>Cross Dock</option>
            </select>

            <select id="filterStatus">
              <option value="">All Status</option>
              <option>Incoming</option>
              <option>Dropped</option>
              <option>Loading</option>
              <option>Dock Ready</option>
              <option>Ready</option>
              <option>Departed</option>
            </select>

            <button id="btnClearFilters" class="secondary">
              Clear
            </button>
          </div>

          <div class="divider"></div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Trailer</th>
                  <th>Direction</th>
                  <th>Status</th>
                  <th>Door</th>
                  <th>Drop</th>
                  <th>Note</th>
                  <th>Updated</th>
                  <th id="actionsColHead">Actions</th>
                </tr>
              </thead>

              <tbody id="tbody">
                <tr>
                  <td colspan="8">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>

      <!-- ROLE PANEL -->
      <div class="card">
        <h3>
          <span id="panelTitle">Controls</span>
          <span class="mini" id="panelSub">—</span>
        </h3>

        <div class="body" id="panelBody">
          <!-- Filled dynamically by app.js -->
        </div>
      </div>

    </div>

    <!-- DOCK PLATES (Hidden automatically on driver view) -->
    <div class="card" id="dockPlatesCard">
      <h3>
        Dock Plates (18–42)
      </h3>
      <div class="body">
        <div class="plate-grid" id="platesGrid">
          <!-- Filled by app.js -->
        </div>
      </div>
    </div>

    <!-- SAFETY CONFIRMATIONS -->
    <div class="card">
      <h3>
        Safety Confirmations
        <span class="mini" id="confCount">0</span>
      </h3>

      <div class="body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Trailer</th>
                <th>Door</th>
                <th>IP</th>
              </tr>
            </thead>

            <tbody id="confBody">
              <tr>
                <td colspan="4">No confirmations yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast">
    <strong id="toastTitle"></strong>
    <div id="toastBody"></div>
  </div>

  <script src="/app.js"></script>

</body>
</html>
