<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wesbell Trailer Status</title>

<style>
:root{
  --bg0:#050814;
  --bg2:#0b1430;
  --line:rgba(120,145,220,.18);
  --text:#eaf0ff;
  --muted:#a7b2d3;
  --good:#22c55e;
  --warn:#f59e0b;
  --bad:#ef4444;
  --cool:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  background:
    radial-gradient(1000px 500px at 20% -10%, rgba(99,102,241,.35), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg2));
}
.wrap{max-width:1200px;margin:auto;padding:20px}
.topbar{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:14px;border:1px solid var(--line);
  border-radius:14px;background:rgba(255,255,255,.04)
}
.brand h1{margin:0;font-size:18px}
.sub{font-size:12px;color:var(--muted)}
.kpis{display:flex;gap:12px;flex-wrap:wrap}
.kpi{font-size:12px;color:var(--muted)}
.kpi strong{color:#fff}
.badge{
  display:inline-block;padding:2px 8px;border-radius:999px;
  border:1px solid rgba(120,145,220,.25);
  background:rgba(255,255,255,.04);font-size:11px
}
.badge.ok{border-color:rgba(34,197,94,.4);color:#22c55e}
.badge.off{border-color:rgba(245,158,11,.4);color:#f59e0b}

.card{
  margin-top:14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.04);
  overflow:hidden;
}
.controls{padding:14px;display:flex;gap:10px;flex-wrap:wrap}
input,select,button{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#0c132a;
  color:#fff;
}
button{cursor:pointer;font-weight:700}
button.primary{background:rgba(99,102,241,.25)}
button.danger{background:rgba(239,68,68,.25)}
button.ghost{background:transparent}

table{width:100%;border-collapse:collapse}
thead th{
  font-size:12px;color:var(--muted);
  padding:12px;text-align:left;border-bottom:1px solid var(--line)
}
tbody td{
  padding:12px;border-bottom:1px solid rgba(120,145,220,.12)
}
tbody tr{transition:all .15s ease}
tbody tr:hover{background:rgba(255,255,255,.03)}

.tag{
  padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900
}
.good{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35)}
.warn{background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.35)}
.bad{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.35)}
.cool{background:rgba(148,163,184,.18);border:1px solid rgba(148,163,184,.35)}

.readyBtn{
  border:1px solid rgba(34,197,94,.45);
  background:rgba(34,197,94,.18);
  font-weight:900;
}
.flash{
  animation:flash 1s infinite;
}
@keyframes flash{
  50%{box-shadow:0 0 10px rgba(34,197,94,.6)}
}

/* Dock strip */
.platePanel{
  position:fixed;right:12px;bottom:12px;
  background:rgba(10,14,28,.96);
  border:1px solid rgba(120,145,220,.25);
  border-radius:12px;padding:8px 10px;
  display:flex;gap:6px;flex-wrap:wrap;
  max-width:95vw;z-index:9999
}
.plate{
  min-width:32px;text-align:center;
  padding:4px 6px;border-radius:6px;
  font-size:11px;font-weight:900;cursor:pointer
}
.plate.ok{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.4)}
.plate.service{background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.5)}

.footer{
  margin-top:40px;text-align:center;
  font-size:11px;color:rgba(167,178,211,.6)
}
.footer strong{color:rgba(255,255,255,.8)}
</style>
</head>

<body>
<div class="wrap">

<div class="topbar">
  <div class="brand">
    <h1>Wesbell Logistics</h1>
    <div class="sub" id="modeLabel"></div>
  </div>
  <div class="kpis">
    <span class="kpi">Total <strong id="kTotal">0</strong></span>
    <span class="kpi">Ready <strong id="kReady">0</strong></span>
    <span class="kpi">Loading <strong id="kLoading">0</strong></span>
    <span class="kpi">Incoming <strong id="kIncoming">0</strong></span>
    <span class="badge ok" id="liveDot">● Live</span>
  </div>
</div>

<div class="card">
<div class="controls" id="controls">
  <input id="trailer" placeholder="Trailer #" />
  <input id="door" placeholder="Door (18-42)" />
  <select id="direction">
    <option>Inbound</option>
    <option>Outbound</option>
    <option>Cross Dock</option>
  </select>
  <select id="status">
    <option>Incoming</option>
    <option>Loading</option>
    <option>Dock Ready</option>
    <option>Ready</option>
  </select>
  <input id="note" placeholder="Quick note (optional)" />
  <button class="primary" id="addBtn">Add / Update</button>
  <button class="danger" id="clearBtn">Clear All</button>
</div>

<table>
<thead>
<tr>
  <th>Trailer</th>
  <th>Door</th>
  <th>Direction</th>
  <th>Status</th>
  <th>Note</th>
  <th id="actionHeader">Actions</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">
  © <span id="year"></span> <strong>Christopher W Dhanraj</strong> • Version <span id="appVersion">...</span>
</div>

</div>

<div class="platePanel" id="platePanel"></div>

<script>
(async function(){

document.getElementById("year").textContent=new Date().getFullYear();
fetch("/api/version").then(r=>r.json()).then(d=>{
  document.getElementById("appVersion").textContent=d.version
});

const path=location.pathname.toLowerCase();
const isDock=path.includes("/dock");
const isDriver=path.includes("/driver");
const isDispatcher=!isDock&&!isDriver;

document.getElementById("modeLabel").textContent=
  isDock?"Dock Mode":isDriver?"Driver Mode":"Dispatcher Mode";

const tbody=document.getElementById("tbody");
const state={};
let dockPlates={};

function statusClass(s){
  if(s==="Ready")return"good";
  if(s==="Dock Ready")return"cool";
  if(s==="Loading")return"warn";
  if(s==="Incoming")return"bad";
  return"cool";
}

async function load(){
  const r=await fetch("/api/state");
  const data=await r.json();
  Object.assign(state,data);
  render();
}
async function loadPlates(){
  const r=await fetch("/api/dockplates");
  dockPlates=await r.json();
  renderPlates();
}

function render(){
  tbody.innerHTML="";
  Object.entries(state).forEach(([t,v])=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td><b>${t}</b></td>
      <td>${v.door||"-"}</td>
      <td>${v.direction||""}</td>
      <td><span class="tag ${statusClass(v.status)}">${v.status}</span></td>
      <td>${v.note||""}</td>
    `;
    const td=document.createElement("td");

    if(isDock){
      if(v.status==="Incoming"){
        const b=document.createElement("button");
        b.textContent="Loading";
        b.onclick=()=>updateStatus(t,"Loading");
        td.appendChild(b);
      }
      if(v.status==="Loading"){
        const b=document.createElement("button");
        b.textContent="Dock Ready";
        b.onclick=()=>updateStatus(t,"Dock Ready");
        td.appendChild(b);
      }
    }

    if(isDispatcher){
      const sel=document.createElement("select");
      ["Incoming","Loading","Dock Ready","Ready"].forEach(s=>{
        const o=document.createElement("option");
        o.textContent=s;o.value=s;
        sel.appendChild(o);
      });
      sel.value=v.status;
      sel.onchange=()=>updateFull(t,sel.value);
      td.appendChild(sel);
    }

    if(isDriver && v.status==="Ready"){
      const b=document.createElement("button");
      b.className="readyBtn flash";
      b.textContent="MOVE";
      b.onclick=()=>confirmMove(t,v);
      td.appendChild(b);
    }

    tr.appendChild(td);
    tbody.appendChild(tr);
  });
}

async function updateStatus(trailer,status){
  await fetch("/api/upsert",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({trailer,status})
  });
  load();
}

async function updateFull(trailer,status){
  const v=state[trailer];
  await fetch("/api/upsert",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      trailer,
      door:v.door,
      direction:v.direction,
      status,
      note:v.note
    })
  });
  load();
}

async function confirmMove(t,v){
  if(!confirm("Confirm load secured?"))return;
  if(!confirm("Confirm dock plate up?"))return;

  await fetch("/api/confirm-safety",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      trailer:t,
      door:v.door,
      loadSecured:true,
      dockPlateUp:true
    })
  });

  await updateStatus(t,"Departed");
}

function renderPlates(){
  const panel=document.getElementById("platePanel");
  panel.innerHTML="";
  for(let i=18;i<=42;i++){
    const key=String(i);
    const p=document.createElement("div");
    const status=dockPlates[key]?.status||"OK";
    p.className="plate "+(status==="OK"?"ok":"service");
    p.textContent=key;
    panel.appendChild(p);
  }
}

load();
loadPlates();
setInterval(load,5000);
setInterval(loadPlates,5000);

})();
</script>

</body>
</html>
