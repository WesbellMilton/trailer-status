<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
    <title>Wesbell Dispatch Master</title>
    <link rel="stylesheet" href="/style.css"/>
    <style>
        /* GRADIENT KILL - Protects high-contrast screens */
        body { background: #070a0f !important; background-image: none !important; }
        #driverView { background: #070a0f !important; }
        /* Hide Nav when in Driver Mode */
        body.mode-driver .topbar, body.mode-driver .bottom-nav { display: none !important; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand-block"><div class="brand-mark">W</div><div class="brand-name">WESBELL</div></div>
            <nav class="nav">
                <a href="/" class="nav-item" id="navDispatch">Dispatcher</a>
                <a href="/dock" class="nav-item" id="navDock">Dock</a>
                <a href="/driver" class="nav-item" id="navDriver">Driver</a>
                <a href="/management" class="nav-item" id="navManagement">Management</a>
            </nav>
            <div class="topbar-right">
                <div class="chip"><div class="live-dot" id="wsDot"></div>Live</div>
                <button id="btnStaffLogin" class="tb-btn">🔑 Staff Login</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        
        <div id="dispatchView" style="display:none;">
            <div class="grid-main">
                <div class="col-stack">
                    <div class="panel">
                        <div class="panel-hd"><div class="panel-title">Active Board</div></div>
                        <div id="tbody" class="panel-body-flush"></div>
                    </div>
                </div>
                <div class="side-sticky">
                    <div class="panel" id="adminPanel">
                        </div>
                </div>
            </div>
        </div>

        <div id="driverView" style="display:none;">
            <div class="ts-progress-track"><div id="ts-pb" class="ts-progress-bar"></div></div>
            
            <div id="ts-s-home" class="ts-screen ts-active">
                <h1>Trailer Check-In</h1>
                <input type="text" id="ts-home-trailer" class="ts-input-hero" placeholder="TRAILER #">
                <button id="ts-home-go" class="ts-btn-primary">CONTINUE</button>
            </div>

            <div id="ts-s-mode" class="ts-screen">
                <h2>Identify Service</h2>
                <div class="ts-grid-2">
                    <div class="ts-card ts-wesbell" data-mode="Wesbell"><b>Wesbell Driver</b><small>Internal Fleet</small></div>
                    <div class="ts-card ts-carrier" data-mode="Carrier"><b>Outside Carrier</b><small>Third Party</small></div>
                </div>
            </div>

            <div id="ts-s-actions-wesbell" class="ts-screen">
                <div class="ts-grid-menu">
                    <div class="ts-menu-item gold" data-action="arrive"><b>I Have Arrived</b></div>
                    <div class="ts-menu-item blue" data-action="omw"><b>On My Way</b></div>
                    <div class="ts-menu-item green" data-action="qd"><b>Quick Drop</b><small>No Prompt</small></div>
                    <div class="ts-menu-item purple" data-action="shunt"><b>Shunt Trailer</b><small>No Prompt</small></div>
                    <div class="ts-menu-item orange" data-action="xdock"><b>Cross Dock</b></div>
                </div>
            </div>

            <div id="ts-s-actions-carrier" class="ts-screen">
                <div class="ts-grid-menu">
                    <div class="ts-menu-item orange" data-action="xdock"><b>Cross Dock</b><small>Safety Required</small></div>
                </div>
            </div>

            <div id="ts-s-safety" class="ts-screen">
                <h2>Safety Check</h2>
                <div class="ts-check-list">
                    <label class="ts-check-item" data-key="load"><input type="checkbox"> Load Secured</label>
                    <label class="ts-check-item" data-key="plate"><input type="checkbox"> Dock Plate Up</label>
                </div>
                <button id="ts-safety-submit" class="ts-btn-primary green" disabled>CONFIRM</button>
            </div>
        </div>

    </main>

    <div class="modal-ov hidden" id="staffLoginOv">
        <div class="modal">
            <h4>Staff Override</h4>
            <select id="staffRole"><option value="dispatcher">Dispatcher</option><option value="management">Management</option><option value="admin">Admin</option></select>
            <input type="password" id="staffPin" placeholder="PIN">
            <button id="btnStaffGo" class="btn btn-primary">Login</button>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
