<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trailer Status Board</title>

<style>
:root{
  --bg0:#050814;
  --bg2:#0b1430;
  --line:rgba(120,145,220,.18);
  --text:#eaf0ff;
  --muted:#a7b2d3;
  --good:#22c55e;
  --warn:#f59e0b;
  --bad:#ef4444;
  --cool:#94a3b8;
  --shadow: 0 12px 40px rgba(0,0,0,.35);
  --radius: 18px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui;
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(99,102,241,.35), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(34,197,94,.22), transparent 55%),
    linear-gradient(180deg, var(--bg0), var(--bg2));
}

.wrap{max-width:1200px;margin:auto;padding:20px;}

.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px;
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:rgba(255,255,255,.04);
  box-shadow:var(--shadow);
}

.brand h1{margin:0;font-size:18px;}
.brand .sub{color:var(--muted);font-size:12px;}

.kpi{margin-left:10px;font-size:13px;color:var(--muted);}
.kpi strong{color:var(--text);}

.card{
  margin-top:14px;
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:rgba(255,255,255,.04);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.controls{padding:14px;display:flex;flex-wrap:wrap;gap:10px;}
input,select,button{
  border-radius:10px;
  border:1px solid var(--line);
  background:#0c132a;
  color:var(--text);
  padding:8px 10px;
}
button{cursor:pointer;font-weight:700}
button.primary{background:rgba(99,102,241,.25)}
button.danger{background:rgba(239,68,68,.25)}

table{width:100%;border-collapse:collapse;}
thead th{
  font-size:12px;
  color:var(--muted);
  text-align:left;
  padding:12px;
  border-bottom:1px solid var(--line);
}
tbody td{
  padding:12px;
  border-bottom:1px solid rgba(120,145,220,.12);
}
tbody tr:hover{background:rgba(255,255,255,.03)}

.tag{
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}
.good{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35);color:#b9ffd0;}
.warn{background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.35);}
.bad{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.35);}
.cool{background:rgba(148,163,184,.18);border:1px solid rgba(148,163,184,.35);}

.ready-green{
  background:rgba(34,197,94,.15)!important;
  border-color:rgba(34,197,94,.35)!important;
  color:#b9ffd0!important;
}

.flash-green{
  background:rgba(34,197,94,.25)!important;
  border-color:rgba(34,197,94,.6)!important;
  color:#b9ffd0!important;
  animation:flash 1s infinite;
}
@keyframes flash{
  0%{box-shadow:0 0 0 rgba(34,197,94,0)}
  50%{box-shadow:0 0 15px rgba(34,197,94,.7)}
  100%{box-shadow:0 0 0 rgba(34,197,94,0)}
}

.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  display:flex;justify-content:center;align-items:center;
}
.modal{
  background:#0c132a;
  padding:20px;
  border-radius:14px;
  max-width:500px;width:100%;
}
.modal h2{margin-top:0}
.modal .actions{display:flex;gap:10px;margin-top:14px}
</style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Wesbell Logistics</h1>
      <div class="sub">Trailer Status Board</div>
    </div>
    <div>
      <span class="kpi">Total <strong id="kpiTotal">0</strong></span>
      <span class="kpi">Ready <strong id="kpiReady">0</strong></span>
      <span class="kpi">Loading <strong id="kpiLoading">0</strong></span>
      <span class="kpi">Incoming <strong id="kpiIncoming">0</strong></span>
      <span class="kpi">Departed <strong id="kpiDeparted">0</strong></span>
    </div>
  </div>

  <div class="card">
    <div class="controls" id="controls">
      <input id="trailer" placeholder="Trailer #" />
      <input id="door" placeholder="Dock Door" />
      <select id="direction">
        <option>Inbound</option>
        <option>Outbound</option>
        <option>Cross Dock</option>
      </select>
      <select id="status">
        <option>Incoming</option>
        <option>Loading</option>
        <option>Ready</option>
      </select>
      <button class="primary" id="addBtn">Add / Update</button>
      <button class="danger" id="clearBtn">Clear All</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Trailer</th>
          <th>Door</th>
          <th>Direction</th>
          <th>Status</th>
          <th id="actionsHeader">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const isDriver = (params.get("mode")||"").toLowerCase()==="driver";

let state = {};
let ackMap = JSON.parse(localStorage.getItem("driver_ack")||"{}");

if(isDriver){
  document.getElementById("controls").style.display="none";
  document.getElementById("actionsHeader").textContent="Move";
}

function statusClass(s){
  if(s==="Ready") return "good";
  if(s==="Loading") return "warn";
  if(s==="Incoming") return "bad";
  return "cool";
}

function render(){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  Object.entries(state).forEach(([trailer,v])=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${trailer}</td>
      <td>${v.door||"-"}</td>
      <td>${v.direction}</td>
      <td><span class="tag ${statusClass(v.status)}">${v.status}</span></td>
    `;
    const td=document.createElement("td");

    if(!isDriver){
      const sel=document.createElement("select");
      ["Incoming","Loading","Ready"].forEach(s=>{
        const o=document.createElement("option");
        o.value=s;o.textContent=s;
        sel.appendChild(o);
      });
      sel.value=v.status==="Departed"?"Ready":v.status;
      sel.onchange=()=>update(trailer,v.door,v.direction,sel.value);
      td.appendChild(sel);
    } else {
      if(v.status==="Ready"){
        const btn=document.createElement("button");
        const flash = ackMap[trailer]!==v.updatedAt;
        btn.className=flash?"flash-green":"ready-green";
        btn.textContent=flash?"NEW READY • MOVE":"READY • MOVE";
        btn.onclick=()=>confirmMove(trailer,v);
        td.appendChild(btn);
      } else td.innerHTML="-";
    }

    tr.appendChild(td);
    tbody.appendChild(tr);
  });
  updateKPIs();
}

function updateKPIs(){
  const vals={Incoming:0,Loading:0,Ready:0,Departed:0};
  Object.values(state).forEach(v=>vals[v.status]++);
  document.getElementById("kpiTotal").textContent=Object.keys(state).length;
  document.getElementById("kpiReady").textContent=vals.Ready;
  document.getElementById("kpiLoading").textContent=vals.Loading;
  document.getElementById("kpiIncoming").textContent=vals.Incoming;
  document.getElementById("kpiDeparted").textContent=vals.Departed;
}

async function update(trailer,door,direction,status){
  await fetch("/api/upsert",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({trailer,door,direction,status})});
  load();
}

async function confirmMove(trailer,v){
  const ok=confirm("Confirm Load Secured and Dock Plate Up?");
  if(!ok)return;
  await fetch("/api/confirm-safety",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({trailer:v.trailer,door:v.door,loadSecured:true,dockPlateUp:true})});
  ackMap[trailer]=v.updatedAt;
  localStorage.setItem("driver_ack",JSON.stringify(ackMap));
  await update(trailer,v.door,v.direction,"Departed");
}

async function load(){
  const res=await fetch("/api/state");
  state=await res.json();
  render();
}

document.getElementById("addBtn").onclick=()=>{
  const trailer=document.getElementById("trailer").value.trim();
  if(!trailer)return;
  update(trailer,
    document.getElementById("door").value.trim(),
    document.getElementById("direction").value,
    document.getElementById("status").value);
  document.getElementById("trailer").value="";
};

document.getElementById("clearBtn").onclick=()=>fetch("/api/clear",{method:"POST"}).then(load);

load();
setInterval(load,3000);
</script>
</body>
</html>
