<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trailer Status Board</title>

  <style>
    :root{
      --text:#eaf0ff;
      --muted:#a9b4d0;
      --line:#263454;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --card:rgba(18,27,47,0.92);
      --bg1:#070b14;
      --bg2:#0b1220;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
    }

    .wrap{max-width:1100px;margin:auto;padding:20px;}
    .company{text-align:center;font-size:26px;font-weight:800;margin-bottom:6px;}
    .subtitle{text-align:center;color:var(--muted);margin-bottom:20px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}

    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    input,select,button{
      border-radius:10px;border:1px solid var(--line);
      background:#0d1528;color:var(--text);padding:10px;
    }
    button{cursor:pointer}
    button.primary{background:#1b2a52;}
    button.danger{background:#3a1020;}
    button.ghost{background:transparent;}

    table{width:100%;border-collapse:collapse;margin-top:15px;}
    th,td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;}
    th{text-align:left;font-size:12px;color:var(--muted);}

    .pill{padding:6px 10px;border-radius:999px;display:inline-block;font-weight:700;}
    .good{background:var(--good);color:#06120b;}
    .warn{background:var(--warn);color:#1a1202;}
    .bad{background:var(--bad);color:#1a0202;}

    .small{color:var(--muted);font-size:12px;margin-top:10px;}
    .right{margin-left:auto;}
    .hint{color:var(--muted);font-size:12px;margin-top:6px;}
  </style>
</head>

<body>
<div class="wrap">
  <div class="company">Wesbell Logistics</div>
  <div class="subtitle">Trailer Status Board</div>

  <div class="card">
    <div id="controls" class="row">
      <input id="trailer" placeholder="Trailer #" />
      <select id="direction">
        <option value="Inbound">Inbound</option>
        <option value="Outbound">Outbound</option>
        <option value="Cross Dock">Cross Dock</option>
      </select>
      <select id="status">
        <option value="Incoming">Incoming</option>
        <option value="Loading">Loading</option>
        <option value="Ready">Ready</option>
      </select>

      <button class="primary" id="addBtn">Add / Update</button>
      <button class="danger" id="clearBtn">Clear All</button>

      <input id="search" class="right" placeholder="Search trailer…" style="min-width:240px;" />
    </div>

    <div class="row" style="margin-top:10px; gap:8px;">
      <button class="primary" id="filterAll">All</button>
      <button class="primary" id="filterInbound">Inbound</button>
      <button class="primary" id="filterOutbound">Outbound</button>
      <button class="primary" id="filterCross">Cross Dock</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Trailer #</th>
          <th>Direction</th>
          <th>Status</th>
          <th id="actionsHeader">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="small" id="modeNote"></div>
    <div class="hint">
      Driver view: add <b>?mode=driver</b> to the URL (read-only).
    </div>
  </div>
</div>

<script>
  // Mode: dispatcher (default) or driver
  const params = new URLSearchParams(location.search);
  const mode = (params.get("mode") || "dispatcher").toLowerCase();
  const isDriver = mode === "driver";

  const controls = document.getElementById("controls");
  const actionsHeader = document.getElementById("actionsHeader");
  const modeNote = document.getElementById("modeNote");

  let state = {}; // server state
  let searchText = "";
  let activeFilter = "All";

  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function statusClass(s){
    return s === "Ready" ? "good" : (s === "Loading" ? "warn" : "bad");
  }

  // Driver view = hide controls + no actions column
  if (isDriver){
    controls.style.display = "none";
    actionsHeader.style.display = "none";
    modeNote.textContent = "Driver view (read-only).";
  } else {
    modeNote.textContent = "Dispatcher view (shared board).";
  }

  async function apiGetState(){
    const res = await fetch("/api/state");
    if (!res.ok) throw new Error("Failed to load state");
    state = await res.json();
    render();
  }

  async function apiUpsert(trailer, direction, status){
  try {
    const res = await fetch("/api/upsert", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ trailer, direction, status })
    });

    const text = await res.text();
    console.log("Upsert response:", res.status, text);

    if (!res.ok) {
      alert("Add failed: " + text);
      return;
    }

    await apiGetState();

  } catch (err) {
    alert("Network error: " + err);
    console.error(err);
  }
}
  async function apiDelete(trailer){
    const res = await fetch("/api/delete", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ trailer })
    });
    if (!res.ok) {
      const txt = await res.text();
      alert("Delete failed: " + txt);
      return;
    }
    await apiGetState();
  }

  async function apiClear(){
    const ok = confirm("Clear ALL trailers for everyone?");
    if (!ok) return;

    const res = await fetch("/api/clear", { method: "POST" });
    if (!res.ok) {
      const txt = await res.text();
      alert("Clear failed: " + txt);
      return;
    }
    await apiGetState();
  }

  function render(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let rows = Object.entries(state).map(([trailer, v]) => ({
      trailer,
      direction: v.direction || "Inbound",
      status: v.status || "Incoming",
      updatedAt: v.updatedAt || 0
    }));

    // Filter (by direction)
    if (activeFilter !== "All"){
      rows = rows.filter(r => r.direction === activeFilter);
    }

    // Search (trailer only)
    if (searchText.trim()){
      const q = searchText.trim().toLowerCase();
      rows = rows.filter(r => r.trailer.toLowerCase().includes(q));
    }

    // Keep STATUS sort (Ready -> Loading -> Incoming) then trailer
    const rank = (s)=> s==="Ready" ? 0 : (s==="Loading" ? 1 : 2);
    rows.sort((a,b)=> (rank(a.status)-rank(b.status)) || a.trailer.localeCompare(b.trailer));

    if (!rows.length){
      const tr = document.createElement("tr");
      const cols = isDriver ? 3 : 4;
      tr.innerHTML = <td colspan="${cols}" style="color:var(--muted);">No trailers.</td>;
      tbody.appendChild(tr);
      return;
    }

    for (const r of rows){
      const tr = document.createElement("tr");
      const cls = statusClass(r.status);

      tr.innerHTML = `
        <td><strong>${escapeHtml(r.trailer)}</strong></td>
        <td>${escapeHtml(r.direction)}</td>
        <td><span class="pill ${cls}">${escapeHtml(r.status)}</span></td>
      `;

      if (!isDriver){
        const td = document.createElement("td");

        // quick status change
        const statusSel = document.createElement("select");
        ["Incoming","Loading","Ready"].forEach(s=>{
          const o = document.createElement("option");
          o.value = s; o.textContent = s;
          statusSel.appendChild(o);
        });
        statusSel.value = r.status;
        statusSel.style.marginRight = "6px";
        statusSel.onchange = () => apiUpsert(r.trailer, r.direction, statusSel.value);
        td.appendChild(statusSel);

        // delete
        const del = document.createElement("button");
        del.className = "danger";
        del.textContent = "Delete";
        del.onclick = () => apiDelete(r.trailer);
        td.appendChild(del);

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
  }

  // Wire controls (dispatcher only)
  if (!isDriver){
    document.getElementById("addBtn").onclick = () => {
      const trailer = document.getElementById("trailer").value.trim();
      const direction = document.getElementById("direction").value;
      const status = document.getElementById("status").value;
      if (!trailer) return;

      apiUpsert(trailer, direction, status);
      document.getElementById("trailer").value = "";
    };

    document.getElementById("clearBtn").onclick = apiClear;

    document.getElementById("trailer").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("addBtn").click();
    });
  }

  // Search + filters
  document.getElementById("search").addEventListener("input", (e) => {
    searchText = e.target.value;
    render();
  });

  const setFilter = (f)=>{ activeFilter = f; render(); };
  document.getElementById("filterAll").onclick = ()=> setFilter("All");
  document.getElementById("filterInbound").onclick = ()=> setFilter("Inbound");
  document.getElementById("filterOutbound").onclick = ()=> setFilter("Outbound");
  document.getElementById("filterCross").onclick = ()=> setFilter("Cross Dock");

  // Simple refresh loop (no websocket, no timer shown on screen)
  async function start(){
    await apiGetState();
    setInterval(apiGetState, 3000);
  }

  start().catch(err => {
    document.body.innerHTML = "<pre style='color:white;padding:20px;'>Error: " + err + "</pre>";
  });
</script>
</body>
</html>
