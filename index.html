<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wesbell Trailer Status</title>

<!-- Leaflet (Map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --bg0:#050814;
  --bg2:#0b1430;
  --line:rgba(120,145,220,.18);
  --text:#eaf0ff;
  --muted:#a7b2d3;
  --good:#22c55e;
  --warn:#f59e0b;
  --bad:#ef4444;
  --cool:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(1000px 500px at 20% -10%, rgba(99,102,241,.35), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg2));
}
.wrap{max-width:1200px;margin:auto;padding:20px}
.topbar{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:14px;border:1px solid var(--line);
  border-radius:14px;background:rgba(255,255,255,.04)
}
.brand h1{margin:0;font-size:18px}
.sub{font-size:12px;color:var(--muted)}
.kpis{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;align-items:center}
.kpi{font-size:13px;color:var(--muted);white-space:nowrap}
.kpi strong{color:#fff}
.badge{
  display:inline-block;padding:2px 8px;border-radius:999px;
  border:1px solid rgba(120,145,220,.25);
  background:rgba(255,255,255,.04);color:#fff;font-size:12px
}

.card{
  margin-top:14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.04);
  overflow:hidden;
}

.controls{
  padding:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center
}
input,select,button{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#0c132a;
  color:#fff;
}
button{cursor:pointer;font-weight:900}
button.primary{background:rgba(99,102,241,.25)}
button.danger{background:rgba(239,68,68,.25)}
button.ghost{background:transparent}

table{width:100%;border-collapse:collapse}
thead th{
  font-size:12px;color:var(--muted);
  padding:12px;text-align:left;
  border-bottom:1px solid var(--line)
}
tbody td{
  padding:12px;
  border-bottom:1px solid rgba(120,145,220,.12)
}
tbody tr:hover{background:rgba(255,255,255,.03)}

.tag{
  padding:4px 10px;border-radius:999px;
  font-size:12px;font-weight:900;display:inline-block
}
.good{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35)}
.warn{background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.35)}
.bad{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.35)}
.cool{background:rgba(148,163,184,.18);border:1px solid rgba(148,163,184,.35)}

.readyBtn{
  border:1px solid rgba(34,197,94,.45);
  background:rgba(34,197,94,.18);
  font-weight:900;
  padding:10px 12px;
  border-radius:12px;
}

/* FLASH green (new ready) */
.flash{
  animation:flash 1s infinite;
  background:rgba(34,197,94,.32)!important;
  border-color:rgba(34,197,94,.75)!important;
}
@keyframes flash{
  0%{box-shadow:0 0 0 rgba(34,197,94,0)}
  50%{box-shadow:0 0 14px rgba(34,197,94,.85)}
  100%{box-shadow:0 0 0 rgba(34,197,94,0)}
}

.toast{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  background:rgba(10,16,36,.92);
  border:1px solid rgba(120,145,220,.25);
  padding:10px 14px;border-radius:12px;
  color:#fff;font-weight:900;
  display:none;z-index:9999;
  max-width:min(680px, 92vw);
}
.toast.show{display:block}

/* Footer */
.footer{
  text-align:center;
  color:rgba(167,178,211,.9);
  font-size:12px;
  padding:12px 0 6px 0;
}

/* Dock plates bar bottom-right */
.platesBar{
  position:fixed;
  right:14px;
  bottom:14px;
  background:rgba(10,16,36,.85);
  border:1px solid rgba(120,145,220,.25);
  border-radius:14px;
  padding:10px 10px;
  display:flex;
  gap:8px;
  align-items:center;
  max-width:min(560px, 92vw);
}
.platesTitle{font-weight:900;font-size:12px;color:var(--muted);margin-right:6px;white-space:nowrap}
.platePill{
  padding:6px 9px;border-radius:999px;
  border:1px solid rgba(120,145,220,.2);
  font-weight:900;font-size:12px;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
}
.plateOK{background:rgba(34,197,94,.20);border-color:rgba(34,197,94,.45)}
.plateService{background:rgba(245,158,11,.20);border-color:rgba(245,158,11,.45)}
.plateUnknown{background:rgba(148,163,184,.16);border-color:rgba(148,163,184,.30)}
.platesHint{font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap}

@media (max-width:720px){
  .platesBar{left:10px;right:10px}
  .platesHint{display:none}
}

/* Geotab panel */
.geoWrap{
  padding:14px;
  border-top:1px solid rgba(120,145,220,.18);
  display:none; /* shown only for dispatcher/dock */
}
.geoHead{
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
}
.geoTitle{font-weight:900}
.geoStatus{color:rgba(167,178,211,.85);font-size:12px}
#map{
  height:320px;margin-top:10px;border-radius:12px;overflow:hidden;
  border:1px solid rgba(120,145,220,.18);
}
.geoList{
  margin-top:10px;color:rgba(167,178,211,.9);font-size:12px
}
</style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Wesbell Logistics</h1>
      <div class="sub" id="modeLabel">Trailer Status Board</div>
    </div>

    <div class="kpis">
      <span class="kpi">Total <strong id="kTotal">0</strong></span>
      <span class="kpi">Incoming <strong id="kIncoming">0</strong></span>
      <span class="kpi">Loading <strong id="kLoading">0</strong></span>
      <span class="kpi">Dock Ready <strong id="kDockReady">0</strong></span>
      <span class="kpi">Ready <strong id="kReady">0</strong></span>
      <span class="kpi">Departed <strong id="kDeparted">0</strong></span>
      <span class="badge" id="liveBadge">● Live</span>
    </div>
  </div>

  <div class="card">

    <!-- Dispatcher controls only -->
    <div class="controls" id="controls">
      <input id="trailer" placeholder="Trailer #" />
      <input id="door" placeholder="Door (18-42)" />
      <select id="direction">
        <option>Inbound</option>
        <option>Outbound</option>
        <option>Cross Dock</option>
      </select>
      <select id="status">
        <option>Incoming</option>
        <option>Loading</option>
        <option>Dock Ready</option>
        <option>Ready</option>
      </select>
      <input id="note" placeholder="Quick note (optional)" style="min-width:220px;flex:1" />
      <button class="primary" id="addBtn">Add / Update</button>
      <button class="danger" id="clearBtn">Clear All</button>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;align-items:center" id="links"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Trailer</th>
          <th>Door</th>
          <th>Direction</th>
          <th>Status</th>
          <th>Note</th>
          <th id="actionHeader">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <!-- Geotab (dispatcher + dock) -->
    <div class="geoWrap" id="geoWrap">
      <div class="geoHead">
        <div class="geoTitle">Geotab Lite – Last GPS</div>
        <div class="geoStatus" id="geoStatus">Loading…</div>
      </div>
      <div id="map"></div>
      <div class="geoList" id="geoList"></div>
    </div>

    <div class="footer" id="footerText"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Dock plates bottom-right -->
<div class="platesBar" id="platesBar" title="Click plate to change status (Dispatcher + Dock)">
  <div class="platesTitle">Dock Plates (18–42)</div>
  <div id="platesWrap" style="display:flex;gap:6px;align-items:center;overflow:auto"></div>
  <div class="platesHint" id="platesHint"></div>
</div>

<script>
(() => {
  const APP_VERSION = "2.2.0";

  const pathLower = location.pathname.toLowerCase();
  const isDriver = pathLower.startsWith("/driver");
  const isDock = pathLower.startsWith("/dock");
  const isDispatcher = !isDriver && !isDock;

  const modeLabel = document.getElementById("modeLabel");
  const controls = document.getElementById("controls");
  const actionHeader = document.getElementById("actionHeader");
  const tbody = document.getElementById("tbody");
  const toast = document.getElementById("toast");
  const footerText = document.getElementById("footerText");
  const links = document.getElementById("links");

  const kTotal = document.getElementById("kTotal");
  const kIncoming = document.getElementById("kIncoming");
  const kLoading = document.getElementById("kLoading");
  const kDockReady = document.getElementById("kDockReady");
  const kReady = document.getElementById("kReady");
  const kDeparted = document.getElementById("kDeparted");

  const trailerInp = document.getElementById("trailer");
  const doorInp = document.getElementById("door");
  const directionSel = document.getElementById("direction");
  const statusSel = document.getElementById("status");
  const noteInp = document.getElementById("note");
  const addBtn = document.getElementById("addBtn");
  const clearBtn = document.getElementById("clearBtn");

  const platesWrap = document.getElementById("platesWrap");
  const platesHint = document.getElementById("platesHint");

  const geoWrap = document.getElementById("geoWrap");
  const geoStatus = document.getElementById("geoStatus");
  const geoList = document.getElementById("geoList");

  let state = {};
  let dockPlates = {};
  let ackMap = JSON.parse(localStorage.getItem("driver_ack") || "{}");

  // show mode
  if (isDriver){
    modeLabel.textContent = "Driver Mode";
    controls.style.display = "none";
    actionHeader.textContent = "Move";
  } else if (isDock){
    modeLabel.textContent = "Dock Mode";
    controls.style.display = "none";
    actionHeader.textContent = "Dock Actions";
    geoWrap.style.display = "block";
  } else {
    modeLabel.textContent = "Dispatcher Mode";
    geoWrap.style.display = "block";
    links.innerHTML = `
      <span class="badge">Dock: <a style="color:#b7c5ff" href="/dock">/dock</a></span>
      <span class="badge">Driver: <a style="color:#b7c5ff" href="/driver">/driver</a></span>
      <button class="ghost" id="logoutBtn">Logout</button>
    `;
    document.getElementById("logoutBtn").onclick = async () => {
      await fetch("/api/logout", { method:"POST" });
      location.href = "/login";
    };
  }

  // footer
  const year = new Date().getFullYear();
  footerText.textContent = `© ${year} Christopher W Dhanraj • Version ${APP_VERSION}`;

  function toastMsg(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(()=> toast.classList.remove("show"), 2600);
  }

  function statusClass(s){
    if (s === "Ready") return "good";
    if (s === "Dock Ready") return "warn";
    if (s === "Loading") return "warn";
    if (s === "Incoming") return "bad";
    if (s === "Departed") return "cool";
    return "cool";
  }

  function updateKPIs(){
    const c = { Incoming:0, Loading:0, "Dock Ready":0, Ready:0, Departed:0 };
    Object.values(state).forEach(v => { if (c[v.status] !== undefined) c[v.status]++; });
    kTotal.textContent = String(Object.keys(state).length);
    kIncoming.textContent = String(c.Incoming);
    kLoading.textContent = String(c.Loading);
    kDockReady.textContent = String(c["Dock Ready"]);
    kReady.textContent = String(c.Ready);
    kDeparted.textContent = String(c.Departed);
  }

  // normalize door
  function normDoor(v){
    const raw = String(v||"").trim();
    if (!raw) return "";
    const m = raw.match(/(\d{1,3})/);
    return m ? m[1] : raw;
  }

  async function loadState(){
    const res = await fetch("/api/state");
    state = await res.json();
    render();
  }

  async function updateTrailer(trailer, payload){
    // NOTE: server checks permissions by cookie/role
    const body = Object.assign({ trailer }, payload);
    const res = await fetch("/api/upsert", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok){
      const txt = await res.text();
      toastMsg("Update failed: " + txt);
      return false;
    }
    await loadState();
    return true;
  }

  async function deleteTrailer(trailer){
    const res = await fetch("/api/delete", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ trailer })
    });
    if (!res.ok){
      toastMsg("Delete failed: " + (await res.text()));
      return;
    }
    toastMsg("Deleted " + trailer);
    await loadState();
  }

  async function clearAll(){
    const ok = confirm("Clear ALL trailers for everyone?");
    if (!ok) return;
    const res = await fetch("/api/clear", { method:"POST" });
    if (!res.ok){
      toastMsg("Clear failed: " + (await res.text()));
      return;
    }
    toastMsg("Cleared all");
    await loadState();
  }

  async function confirmMove(trailer, v){
    const ok1 = confirm("STEP 1/2: Confirm the LOAD is SECURED.");
    if (!ok1) return;

    const ok2 = confirm("STEP 2/2: Confirm the DOCK PLATE is UP.");
    if (!ok2) return;

    const res = await fetch("/api/confirm-safety", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        trailer,
        door: v.door || "",
        loadSecured: true,
        dockPlateUp: true
      })
    });
    if (!res.ok){
      toastMsg("Confirm failed: " + (await res.text()));
      return;
    }

    ackMap[trailer] = v.updatedAt;
    localStorage.setItem("driver_ack", JSON.stringify(ackMap));

    // Mark departed (dispatcher-only on server? your server allows dispatcher only, so driver won't call /api/upsert)
    // In your server, driver role is public but cannot upsert. So we just show "Confirmed" and dispatcher can mark departed if desired.
    toastMsg("Safety confirmed ✅ (dispatch can mark Departed)");
  }

  function render(){
    tbody.innerHTML = "";

    const entries = Object.entries(state);

    // Sort: Ready first, then Dock Ready, then Loading, Incoming, Departed, then trailer #
    const rank = (s) => s==="Ready" ? 0 : (s==="Dock Ready" ? 1 : (s==="Loading" ? 2 : (s==="Incoming" ? 3 : 4)));
    entries.sort((a,b) => (rank(a[1].status)-rank(b[1].status)) || String(a[0]).localeCompare(String(b[0])));

    if (!entries.length){
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="6" style="color:var(--muted);padding:14px;">No trailers.</td>`;
      tbody.appendChild(tr);
      updateKPIs();
      return;
    }

    for (const [t, v] of entries){
      const door = v.door || "-";
      const dir = v.direction || "Inbound";
      const st = v.status || "Incoming";
      const note = v.note || "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><b>${t}</b></td>
        <td>${door}</td>
        <td>${dir}</td>
        <td><span class="tag ${statusClass(st)}">${st}</span></td>
        <td>${note ? note : "-"}</td>
      `;

      const td = document.createElement("td");

      if (isDispatcher){
        const sel = document.createElement("select");
        ["Incoming","Loading","Dock Ready","Ready","Departed"].forEach(s=>{
          const o = document.createElement("option");
          o.value=s; o.textContent=s;
          sel.appendChild(o);
        });
        sel.value = st;
        sel.onchange = async () => {
          // send direction/door/note always (prevents server rejecting)
          await updateTrailer(t, {
            direction: dir,
            door: door === "-" ? "" : normDoor(door),
            note,
            status: sel.value
          });
        };
        td.appendChild(sel);

        const del = document.createElement("button");
        del.className = "danger";
        del.style.marginLeft = "8px";
        del.textContent = "Delete";
        del.onclick = () => deleteTrailer(t);
        td.appendChild(del);
      }

      else if (isDock){
        const btnLoad = document.createElement("button");
        btnLoad.className = "primary";
        btnLoad.textContent = "Loading";
        btnLoad.onclick = async () => updateTrailer(t, { status:"Loading" });

        const btnDR = document.createElement("button");
        btnDR.className = "primary";
        btnDR.style.marginLeft = "8px";
        btnDR.textContent = "Dock Ready";
        btnDR.onclick = async () => updateTrailer(t, { status:"Dock Ready" });

        td.appendChild(btnLoad);
        td.appendChild(btnDR);
      }

      else if (isDriver){
        if (st === "Ready"){
          const btn = document.createElement("button");
          const isNew = ackMap[t] !== v.updatedAt;
          btn.className = "readyBtn" + (isNew ? " flash" : "");
          btn.textContent = isNew ? "NEW READY • MOVE" : "READY • MOVE";
          btn.onclick = () => confirmMove(t, v);
          td.appendChild(btn);
        } else {
          td.textContent = "-";
        }
      }

      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    updateKPIs();
  }

  // Dispatcher: add/update + clear
  if (isDispatcher){
    addBtn.onclick = async () => {
      const t = trailerInp.value.trim();
      if (!t) return;

      const door = normDoor(doorInp.value.trim());
      const direction = directionSel.value;
      const status = statusSel.value;
      const note = noteInp.value.trim();

      await updateTrailer(t, { door, direction, status, note });

      trailerInp.value="";
      doorInp.value="";
      noteInp.value="";
    };

    clearBtn.onclick = clearAll;
  }

  /* =========================
     Dock plates bar
  ========================= */
  function plateClass(st){
    if (st === "OK") return "platePill plateOK";
    if (st === "Service") return "platePill plateService";
    return "platePill plateUnknown";
  }

  async function loadDockPlates(){
    const res = await fetch("/api/dockplates");
    if (!res.ok) return;
    dockPlates = await res.json();
    renderPlatesBar();
  }

  async function setPlate(door, nextStatus){
    const note = prompt(`Plate ${door} note (optional):`, (dockPlates[door]?.note || ""));
    const res = await fetch("/api/dockplates/set", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ door, status: nextStatus, note: (note||"").trim() })
    });
    if (!res.ok){
      toastMsg("Plate update failed: " + (await res.text()));
      return;
    }
    toastMsg(`Plate ${door} → ${nextStatus}`);
    await loadDockPlates();
  }

  function renderPlatesBar(){
    platesWrap.innerHTML = "";
    let ok=0, svc=0, unk=0;

    for (let d=18; d<=42; d++){
      const key = String(d);
      const st = dockPlates[key]?.status || "Unknown";
      if (st === "OK") ok++; else if (st === "Service") svc++; else unk++;

      const pill = document.createElement("div");
      pill.className = plateClass(st);
      pill.textContent = key;

      pill.onclick = () => {
        // Toggle: OK -> Service -> Unknown -> OK
        const cur = dockPlates[key]?.status || "Unknown";
        const next = cur === "OK" ? "Service" : (cur === "Service" ? "Unknown" : "OK");
        setPlate(key, next);
      };

      platesWrap.appendChild(pill);
    }

    platesHint.textContent = `OK ${ok} • Service ${svc} • Unknown ${unk}`;
  }

  /* =========================
     Geotab Lite Map (Dispatcher + Dock)
  ========================= */
  let map, markersLayer, mapReady = false;

  function initMap(){
    if (mapReady) return;
    mapReady = true;

    // Default GTA center (adjust if you want)
    map = L.map("map").setView([43.65, -79.38], 9);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    markersLayer = L.layerGroup().addTo(map);
  }

  function fmtTime(t){
    try { return new Date(t).toLocaleString(); } catch { return String(t||""); }
  }

  async function loadGeotabPositions(){
    if (!(isDispatcher || isDock)) return;
    initMap();

    try{
      const res = await fetch("/api/geotab/positions");
      if (!res.ok) {
        const txt = await res.text();
        geoStatus.textContent = "Geotab Lite unavailable";
        geoList.innerHTML = `<div>${txt}</div>`;
        markersLayer.clearLayers();
        return;
      }

      const data = await res.json();
      geoStatus.textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;

      markersLayer.clearLayers();

      if (!data.length){
        geoList.innerHTML = "No GPS positions returned.";
        return;
      }

      const bounds = [];
      const lines = [];

      for (const v of data){
        const lat = v.latitude;
        const lng = v.longitude;
        bounds.push([lat, lng]);

        const popup = `
          <div style="font-weight:900">${v.name || "Vehicle"}</div>
          <div>Speed: ${Number.isFinite(v.speed) ? v.speed : "-"} km/h</div>
          <div>Time: ${fmtTime(v.dateTime)}</div>
        `;

        L.marker([lat, lng]).addTo(markersLayer).bindPopup(popup);

        lines.push(
          `<div style="padding:6px 0;border-bottom:1px solid rgba(120,145,220,.12)">
            <b>${v.name || "-"}</b> • ${Number.isFinite(v.speed) ? v.speed : "-"} km/h • ${fmtTime(v.dateTime)}
          </div>`
        );
      }

      geoList.innerHTML = lines.slice(0, 25).join("") + (lines.length > 25 ? `<div style="padding-top:6px;">+${lines.length-25} more…</div>` : "");

      if (bounds.length) map.fitBounds(bounds, { padding:[30,30] });

    } catch (err){
      geoStatus.textContent = "Geotab Lite error";
      geoList.textContent = String(err?.message || err);
      markersLayer?.clearLayers?.();
    }
  }

  /* =========================
     Live updates
  ========================= */
  // Websocket for instant refresh + Ready notify
  try{
    const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${wsProto}//${location.host}`);

    ws.onmessage = (evt) => {
      try{
        const msg = JSON.parse(evt.data);
        if (msg.type === "state"){
          state = msg.payload || {};
          render();
        }
        if (msg.type === "dockplates"){
          dockPlates = msg.payload || {};
          renderPlatesBar();
        }
        if (msg.type === "notify" && msg.payload?.kind === "ready"){
          // Driver toast + flash is handled by ackMap check
          if (isDriver){
            toastMsg(`Trailer ${msg.payload.trailer} READY at Door ${msg.payload.door || "-"}`);
          }
        }
      } catch {}
    };
  } catch {}

  // Initial load + refresh every 5s
  loadState();
  loadDockPlates();
  loadGeotabPositions();

  setInterval(loadState, 5000);
  setInterval(loadDockPlates, 5000);
  setInterval(loadGeotabPositions, 30000);
})();
</script>
