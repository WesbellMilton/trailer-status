<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Trailer Status Board</title>

<style>
:root{
  --text:#eaf0ff;
  --muted:#a9b4d0;
  --line:#263454;
  --good:#22c55e;
  --warn:#f59e0b;
  --bad:#ef4444;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:linear-gradient(180deg,#070b14,#0b1220);
  color:var(--text);
}
.wrap{max-width:1100px;margin:auto;padding:20px;}
.company{text-align:center;font-size:26px;font-weight:800;margin-bottom:6px;}
.subtitle{text-align:center;color:var(--muted);margin-bottom:20px;}
.card{background:rgba(18,27,47,0.9);border:1px solid var(--line);border-radius:14px;padding:16px;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
input,select,button{
  border-radius:10px;
  border:1px solid var(--line);
  background:#0d1528;
  color:var(--text);
  padding:10px;
}
button{cursor:pointer}
button.primary{background:#1b2a52;}
button.danger{background:#3a1020;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:12px;border-bottom:1px solid var(--line);}
th{text-align:left;font-size:12px;color:var(--muted);}
.pill{padding:6px 10px;border-radius:999px;font-weight:700;}
.good{background:var(--good);color:#06120b;}
.warn{background:var(--warn);color:#1a1202;}
.bad{background:var(--bad);color:#1a0202;}
.notesCell{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>

<body>
<div class="wrap">
  <div class="company">Wesbell Logistics</div>
  <div class="subtitle">Trailer Status Board</div>

  <div class="card">
    <div class="row">
      <input id="trailer" placeholder="Trailer #" />
      <select id="status">
        <option>Incoming</option>
        <option>Loading</option>
        <option>Ready</option>
      </select>
      <select id="dockDoor"></select>
      <button class="primary" id="addBtn">Add / Update</button>
      <button class="danger" id="clearBtn">Clear All</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Dock</th>
          <th>Trailer</th>
          <th>Status</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const state = {};
const flashSet = new Set();

function populateDockDoors(){
  const dock = document.getElementById("dockDoor");
  dock.innerHTML = "<option value=''>No Door</option>";
  for(let i=28;i<=42;i++){
    dock.innerHTML += <option value="Dock ${i}">Dock ${i}</option>;
  }
  dock.innerHTML += <option value="Yard">Yard</option>;
}
populateDockDoors();

function statusClass(s){
  return s==="Ready"?"good":(s==="Loading"?"warn":"bad");
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const rows = Object.entries(state)
    .map(([trailer,v])=>({trailer,...v}))
    .sort((a,b)=>{
      const rank = s=>s==="Ready"?0:(s==="Loading"?1:2);
      return rank(a.status)-rank(b.status) || a.trailer.localeCompare(b.trailer);
    });

  if(!rows.length){
    tbody.innerHTML = <tr><td colspan="5" style="color:#aaa;">No trailers.</td></tr>;
    return;
  }

  rows.forEach(r=>{
    const tr=document.createElement("tr");

    if(flashSet.has(r.trailer)){
      tr.style.background="rgba(34,197,94,0.3)";
      setTimeout(()=>tr.style.background="",1000);
    }

    tr.innerHTML=`
      <td>${r.dockDoor||"-"}</td>
      <td><strong>${r.trailer}</strong></td>
      <td><span class="pill ${statusClass(r.status)}">${r.status}</span></td>
      <td class="notesCell">${r.notes||""}</td>
      <td></td>
    `;

    const actionTd=tr.querySelector("td:last-child");

    const noteInput=document.createElement("input");
    noteInput.placeholder="Note...";
    noteInput.value=r.notes||"";
    noteInput.onchange=()=>upsert(r.trailer,r.status,r.dockDoor,noteInput.value);
    actionTd.appendChild(noteInput);

    const statusSel=document.createElement("select");
    ["Incoming","Loading","Ready"].forEach(s=>{
      const o=document.createElement("option");
      o.value=s;o.textContent=s;
      statusSel.appendChild(o);
    });
    statusSel.value=r.status;
    statusSel.onchange=()=>upsert(r.trailer,statusSel.value,r.dockDoor,r.notes);
    actionTd.appendChild(statusSel);

    const del=document.createElement("button");
    del.textContent="Delete";
    del.className="danger";
    del.onclick=()=>delTrailer(r.trailer);
    actionTd.appendChild(del);

    tbody.appendChild(tr);
  });

  flashSet.clear();
}

async function upsert(trailer,status,dockDoor,notes){
  await fetch("/api/upsert",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({trailer,status,dockDoor,notes})
  });
  state[trailer]={status,dockDoor,notes,updatedAt:Date.now()};
  render();
}

async function delTrailer(trailer){
  await fetch("/api/delete",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({trailer})
  });
  delete state[trailer];
  render();
}

async function clearAll(){
  if(!confirm("Clear all trailers?"))return;
  await fetch("/api/clear",{method:"POST"});
  for(const k in state)delete state[k];
  render();
}

document.getElementById("addBtn").onclick=()=>{
  const trailer=document.getElementById("trailer").value.trim();
  if(!trailer)return;
  const status=document.getElementById("status").value;
  const dock=document.getElementById("dockDoor").value;
  upsert(trailer,status,dock,"");
  document.getElementById("trailer").value="";
};

document.getElementById("clearBtn").onclick=clearAll;

const proto=location.protocol==="https:"?"wss":"ws";
const ws=new WebSocket(${proto}://${location.host});

ws.onmessage=(ev)=>{
  const msg=JSON.parse(ev.data);

  if(msg.type==="state"){
    Object.assign(state,msg.payload||{});
    render();
  }

  if(msg.type==="upsert"){
    const {trailer,status,dockDoor,notes,updatedAt,prevStatus}=msg.payload;
    if(prevStatus!=="Ready"&&status==="Ready")flashSet.add(trailer);
    state[trailer]={status,dockDoor,notes,updatedAt};
    render();
  }

  if(msg.type==="delete"){
    delete state[msg.payload.trailer];
    render();
  }
};
</script>
</body>
</html>
