<div class="wrap">

  </div>

<script>
const STORAGE_KEY = "trailer_board_v3";
const params = new URLSearchParams(location.search);
const mode = (params.get("mode") || "dispatcher").toLowerCase();
const isDriver = mode === "driver";
const isCheckin = mode === "checkin";

if (isDriver) {
  document.getElementById("controls").style.display = "none";
  document.getElementById("actionHeader").style.display = "none";
}

if (isCheckin) {
  // Check-in can add only (no delete, no status dropdown)
  document.getElementById("actionHeader").style.display = "none";

  const controls = document.getElementById("controls");
  controls.innerHTML = `
    <input id="trailer" placeholder="Trailer #" />
    <button class="primary" onclick="checkIn()">Check In (Incoming)</button>
  `;
}

function load() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// Tracks which trailers should flash (set when they become Ready)
let flashSet = new Set();

function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  const rows = load();

  rows.forEach(r => {
    const tr = document.createElement("tr");

    let colorClass = "bad";
    if (r.status === "Loading") colorClass = "warn";
    if (r.status === "Ready") colorClass = "good";

    // Green flash effect
    if (flashSet.has(r.trailer)) {
      tr.style.transition = "background 0.2s ease";
      tr.style.background = "rgba(34, 197, 94, 0.35)"; // green glow
      setTimeout(() => {
        tr.style.background = "";
      }, 1200);
    }

    tr.innerHTML = `
      <td><strong>${r.trailer}</strong></td>
      <td><span class="pill ${colorClass}">${r.status}</span></td>
    `;

    if (!isDriver) {
      const td = document.createElement("td");

      const del = document.createElement("button");
      del.textContent = "Delete";
      del.className = "danger";
      del.onclick = () => deleteTrailer(r.trailer);

      td.appendChild(del);
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  });

  // Clear flashes after render so it only flashes once
  flashSet.clear();
}

function addTrailer() {
  const trailer = document.getElementById("trailer").value.trim();
  const status = document.getElementById("status").value;
  if (!trailer) return;

  let rows = load();
  const existing = rows.find(r => r.trailer === trailer);

  // Detect if it just became Ready
  const wasReady = existing ? existing.status === "Ready" : false;

  if (existing) {
    existing.status = status;
  } else {
    rows.push({ trailer, status });
  }

  const isNowReady = status === "Ready";
  if (!wasReady && isNowReady) {
    flashSet.add(trailer);
  }

  save(rows);
  render();
  document.getElementById("trailer").value = "";
}

function checkIn() {
  const trailer = document.getElementById("trailer").value.trim();
  if (!trailer) return;

  let rows = load();
  const existing = rows.find(r => r.trailer === trailer);

  // Safer: do NOT overwrite if it already exists
  if (!existing) {
    rows.push({ trailer, status: "Incoming" });
  }

  save(rows);
  render();
  document.getElementById("trailer").value = "";
  alert("Checked in! Please wait for dispatch.");
}
