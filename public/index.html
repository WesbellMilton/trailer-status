<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Trailer Status Board</title>
<style>
:root{--text:#eaf0ff;--muted:#a9b4d0;--line:#263454;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#070b14,#0b1220);color:var(--text);}
.wrap{max-width:1000px;margin:auto;padding:20px;}
.company{text-align:center;font-size:26px;font-weight:800;margin-bottom:6px;}
.subtitle{text-align:center;color:var(--muted);margin-bottom:20px;}
.card{background:rgba(18,27,47,0.9);border:1px solid var(--line);border-radius:14px;padding:16px;}
input,select,button{border-radius:10px;border:1px solid var(--line);background:#0d1528;color:var(--text);padding:10px;}
button{cursor:pointer} button.primary{background:#1b2a52;} button.danger{background:#3a1020;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:12px;border-bottom:1px solid var(--line);}
th{text-align:left;font-size:12px;color:var(--muted);}
.pill{padding:6px 10px;border-radius:999px;display:inline-block;}
.good{background:var(--good);} .warn{background:var(--warn);} .bad{background:var(--bad);}
.small{color:var(--muted);font-size:12px;margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="company">Wesbell Logistics</div>
  <div class="subtitle">Trailer Status Board</div>

  <div class="card">
   <div id="controls" class="row">
  <input id="trailer" placeholder="Trailer #" />

  <select id="status">
    <option value="Incoming">Incoming</option>
    <option value="Loading">Loading</option>
    <option value="Ready">Ready</option>
  </select>

  <select id="dockDoor"></select>

  <button class="primary" id="addBtn">Add / Update</button>
  <button class="danger" id="clearBtn">Clear All</button>

  <input id="search" placeholder="Search trailer or dock…" style="margin-left:auto; min-width:220px;" />
</div>

<div class="row" style="margin-top:10px; gap:8px;">
  <button class="primary" id="filterAll">All</button>
  <button class="primary" id="filterIncoming">Incoming</button>
  <button class="primary" id="filterLoading">Loading</button>
  <button class="primary" id="filterReady">Ready</button>
</div>

    <table>
   <thead>
  <tr>
  <th>Dock Door</th>
<th>Trailer #</th>
<th>Status</th>
<th>Notes</th>
<th id="actionHeader">Actions</th>
  </tr>
</thead>>
      <tbody id="tbody"></tbody>
    </table>

    <div class="small" id="modeNote"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const mode = (params.get("mode") || "dispatcher").toLowerCase();
const isDriver = mode === "driver";
const isCheckin = mode === "checkin";
// Generate Dock 28–42 dropdown
const dockSelect = document.getElementById("dockDoor");

if (dockSelect) {
  dockSelect.innerHTML = "";

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = "No Door";
  dockSelect.appendChild(defaultOption);

  for (let i = 28; i <= 42; i++) {
    const opt = document.createElement("option");
    opt.value = Dock ${i};
    opt.textContent = Dock ${i};
    dockSelect.appendChild(opt);
  }

  const yard = document.createElement("option");
  yard.value = "Yard";
  yard.textContent = "Yard";
  dockSelect.appendChild(yard);
}
const controls = document.getElementById("controls");
const actionHeader = document.getElementById("actionHeader");
const modeNote = document.getElementById("modeNote");

if (isDriver) {
  controls.style.display = "none";
  actionHeader.style.display = "none";
  modeNote.textContent = "Driver view (real-time, read-only).";
} else if (isCheckin) {
  actionHeader.style.display = "none";
  controls.innerHTML = `
    <input id="trailer" placeholder="Trailer #" />
    <button class="primary" id="checkinBtn">Check In (Incoming)</button>
  `;
  modeNote.textContent = "Incoming check-in (adds Incoming).";
} else {
  modeNote.textContent = "Dispatcher view (real-time).";
}

let flashSet = new Set();
let state = {}; // { trailer: {status, updatedAt} }

function statusClass(s){ return s==="Ready"?"good":(s==="Loading"?"warn":"bad"); }

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  const rows = Object.entries(state).map(([trailer, v]) => ({ trailer, ...v }));

  const rank = (s)=> s==="Ready"?0:(s==="Loading"?1:2);
  rows.sort((a,b)=> (rank(a.status)-rank(b.status)) || a.trailer.localeCompare(b.trailer));

  if (!rows.length){
    const tr = document.createElement("tr");
    tr.innerHTML = <td colspan="${(isDriver||isCheckin)?2:3}" style="color:var(--muted);">No trailers.</td>;
    tbody.appendChild(tr);
    return;
  }

  for (const r of rows){
    const tr = document.createElement("tr");
    if (flashSet.has(r.trailer)){
      tr.style.transition = "background 0.2s ease";
      tr.style.background = "rgba(34,197,94,0.35)";
      setTimeout(()=> tr.style.background="", 1200);
    }
const cls = statusClass(r.status);
   tr.innerHTML = `
  tr.innerHTML = `
  <td><strong>${escapeHtml(r.dockDoor || "-")}</strong></td>
  <td><strong>${escapeHtml(r.trailer)}</strong></td>
  <td><span class="pill ${cls}">${escapeHtml(r.status)}</span></td>
  <td>${escapeHtml(r.notes || "")}</td>
`;

    if (!isDriver && !isCheckin){
      const td = document.createElement("td");
// Notes input (dispatcher only)
const notesInput = document.createElement("input");
notesInput.placeholder = "Add note...";
notesInput.value = r.notes || "";
notesInput.style.marginRight = "6px";
notesInput.style.width = "140px";

notesInput.onchange = () => {
  upsert(r.trailer, r.status, r.dockDoor, notesInput.value);
};

td.appendChild(notesInput);
      const sel = document.createElement("select");
      ["Incoming","Loading","Ready"].forEach(s=>{
        const o=document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o);
      });
      sel.value = r.status;
      sel.onchange = ()=> upsert(r.trailer, sel.value, r.dockDoor);

      const del = document.createElement("button");
      del.className="danger"; del.textContent="Delete"; del.style.marginLeft="8px";
      del.onclick = ()=> delTrailer(r.trailer);

      td.appendChild(sel); td.appendChild(del); tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }

  flashSet.clear();
}

function escapeHtml(str){
  return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

async function upsert(trailer, status, dockDoor, notes){
  await fetch("/api/upsert", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ trailer, status }) });
}

async function checkin(trailer){
  await fetch("/api/checkin", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ trailer }) });
}

async function delTrailer(trailer){
  await fetch("/api/delete", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ trailer }) });
}

async function clearAll(){
  if (!confirm("Clear all trailers?")) return;
  await fetch("/api/clear", { method:"POST" });
}

// Buttons
if (!isDriver && !isCheckin){
  document.getElementById("addBtn").onclick = ()=>{
    const trailer = document.getElementById("trailer").value.trim();
    const status = document.getElementById("status").value;
    if (!trailer) return;
    upsert(trailer, status);
    document.getElementById("trailer").value = "";
  };
  document.getElementById("clearBtn").onclick = clearAll;
  document.getElementById("trailer").addEventListener("keydown",(e)=>{ if(e.key==="Enter") document.getElementById("addBtn").click(); });
}

if (isCheckin){
  document.getElementById("checkinBtn").onclick = ()=>{
    const trailer = document.getElementById("trailer").value.trim();
    if (!trailer) return;
    checkin(trailer);
    document.getElementById("trailer").value = "";
    alert("Checked in! Please wait for dispatch.");
  };
}

// Real-time WebSocket
const proto = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(${proto}://${location.host});

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);

  if (msg.type === "state"){
    state = msg.payload || {};
    render();
    return;
  }

  if (msg.type === "upsert"){
    const { trailer, status, dockDoor, updatedAt, prevStatus } = msg.payload;
    if (prevStatus && prevStatus !== "Ready" && status === "Ready") flashSet.add(trailer);
    state[trailer] = { status, dockDoor, updatedAt };
    render();
    return;
  }

  if (msg.type === "delete"){
    delete state[msg.payload.trailer];
    render();
  }
};
</script>
</body>
</html>
